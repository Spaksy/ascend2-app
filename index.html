<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ASCEND">
<meta name="theme-color" content="#10131F">
<title>ASCEND</title>
<style>
/* ASCEND v2 — Design system (Phase 0.3).
   Direction : AMBIANCE PILOTÉE PAR L'HEURE (choix de Leo).
   L'app s'ouvre sur l'île ; le ciel/fond évolue avec la journée —
   « jour doux » en journée, « nuit étoilée » après 21 h, « aube pastel »
   au lever/coucher. Trois JEUX DE TOKENS pour les MÊMES variables
   sémantiques, commutés par [data-ambiance] (moteur : app/ui/ambiance.js).

   Règle d'accessibilité (calibrée AA contre le fond RENDU) :
   - le TEXTE n'utilise que --ink (≥ 12:1) et --ink-2 (≥ 5:1) sur --bg/--surface ;
   - --accent et --gold sont des REMPLISSAGES / bordures / icônes ; quand du texte
     s'y pose, il prend --on-accent / --on-gold (dark, tous ≥ 5:1) ;
   - plancher typographique 11 px ; cibles tactiles ≥ 44 px ;
   - prefers-reduced-motion : coupe transitions d'ambiance et animations.
   Ratios mesurés (build 0.03) : voir la légende de la page de spécimens. */

/* --- Couleurs de ciel animables : typées <color> pour un fondu réel entre
       ambiances (interpolation de dégradé impossible sans @property). --- */
@property --sky-top    { syntax: '<color>'; inherits: true; initial-value: #BFE3EC; }
@property --sky-mid    { syntax: '<color>'; inherits: true; initial-value: #DCEFF0; }
@property --sky-bottom { syntax: '<color>'; inherits: true; initial-value: #F0F4F5; }

/* ============================ TOKENS ============================ */
:root {
  /* Échelles non thématiques */
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
               'Helvetica Neue', Arial, sans-serif;
  --r-sm: 10px; --r-md: 14px; --r-lg: 20px; --r-pill: 999px;
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 24px; --sp-6: 32px;
  --dur-amb: 1200ms;                 /* fondu du ciel entre ambiances */
  --dur-ui: 160ms;

  /* --- JOUR DOUX (défaut) --- */
  --bg: #F0F4F5;
  --surface: #FFFFFF;
  --surface-2: #F7FAFB;
  --ink: #1E2A2E;                    /* 13.3:1 / bg · 14.7:1 / surface */
  --ink-2: #5A6A70;                  /* 5.0:1 / bg */
  --line: rgba(30, 42, 46, .12);
  --accent: #3DA9A0;                 /* remplissage */
  --on-accent: #0E211F;              /* 5.9:1 sur --accent */
  --accent-soft: rgba(61, 169, 160, .14);
  --gold: #C9A24B;
  --on-gold: #2A2410;                /* 6.1:1 sur --gold */
  --gold-soft: rgba(201, 162, 75, .16);
  --shadow: rgba(30, 42, 46, .10);
  --sky-top: #BFE3EC; --sky-mid: #DCEFF0; --sky-bottom: #F0F4F5;
  --star: transparent;              /* pas d'étoiles en journée */
}

[data-ambiance="crepuscule"] {
  /* --- AUBE PASTEL (lever / coucher) --- */
  --bg: #FBF3EC;
  --surface: #FFF8F1;
  --surface-2: #FDEFE4;
  --ink: #2E2A33;                    /* 12.9:1 / bg */
  --ink-2: #6B6472;                  /* 5.1:1 / bg */
  --line: rgba(46, 42, 51, .12);
  --accent: #E8927C;
  --on-accent: #2E2028;              /* 5.9:1 sur --accent */
  --accent-soft: rgba(232, 146, 124, .16);
  --gold: #C99A3E;
  --on-gold: #2A2410;               /* 5.5:1 sur --gold */
  --gold-soft: rgba(201, 154, 62, .16);
  --shadow: rgba(74, 52, 40, .12);
  --sky-top: #F3B9A0; --sky-mid: #F7D3C0; --sky-bottom: #FBF3EC;
  --star: transparent;
}

[data-ambiance="nuit"] {
  /* --- NUIT ÉTOILÉE (après 21 h) --- */
  --bg: #0E1220;
  --surface: #1A2036;
  --surface-2: #222A44;
  --ink: #EEF1FA;                    /* 16.4:1 / bg */
  --ink-2: #A6AEC6;                  /* 8.4:1 / bg */
  --line: rgba(255, 255, 255, .10);
  --accent: #6EA8FF;
  --on-accent: #0A1020;             /* 7.9:1 sur --accent */
  --accent-soft: rgba(110, 168, 255, .16);
  --gold: #E8C06A;
  --on-gold: #241C08;               /* 10.6:1 sur --gold */
  --gold-soft: rgba(232, 192, 106, .16);
  --shadow: rgba(0, 0, 0, .45);
  --sky-top: #0A0E1C; --sky-mid: #12182B; --sky-bottom: #0E1220;
  --star: rgba(255, 255, 255, .85);
}

/* ============================ BASE ============================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-text-size-adjust: 100%;
  -webkit-font-smoothing: antialiased;
  transition: background-color var(--dur-amb) ease, color var(--dur-amb) ease;
}

/* --- Ciel d'ambiance : couche fixe plein écran, se fond entre thèmes --- */
.sky {
  position: fixed; inset: 0; z-index: -2;
  background: linear-gradient(180deg,
    var(--sky-top) 0%, var(--sky-mid) 48%, var(--sky-bottom) 100%);
  transition: --sky-top var(--dur-amb) ease,
              --sky-mid var(--dur-amb) ease,
              --sky-bottom var(--dur-amb) ease;
}
/* Champ d'étoiles (nuit uniquement — décoratif, pas de contrainte de contraste) */
.sky::after {
  content: ""; position: absolute; inset: 0; z-index: -1;
  background-image:
    radial-gradient(1px 1px at 12% 18%, var(--star), transparent),
    radial-gradient(1px 1px at 28% 42%, var(--star), transparent),
    radial-gradient(1.4px 1.4px at 46% 12%, var(--star), transparent),
    radial-gradient(1px 1px at 63% 34%, var(--star), transparent),
    radial-gradient(1.2px 1.2px at 78% 20%, var(--star), transparent),
    radial-gradient(1px 1px at 88% 46%, var(--star), transparent),
    radial-gradient(1px 1px at 8% 60%, var(--star), transparent),
    radial-gradient(1.3px 1.3px at 34% 68%, var(--star), transparent),
    radial-gradient(1px 1px at 70% 62%, var(--star), transparent);
  transition: opacity var(--dur-amb) ease;
}

/* Splash (repris de la Phase 0.1/0.2) */
#splash {
  position: fixed; inset: 0; z-index: 90;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  transition: opacity .25s ease;
}
#splash.hidden { opacity: 0; pointer-events: none; }
#app { min-height: 100%; }

/* ============================ SPÉCIMENS ============================ */
.wrap {
  max-width: 560px; margin: 0 auto;
  padding: max(24px, env(safe-area-inset-top)) 20px calc(48px + env(safe-area-inset-bottom));
}
.eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: .16em;
  text-transform: uppercase; color: var(--ink-2);
}
.spec-hero { padding: 12px 0 20px; }
.spec-hero h1 {
  font-size: clamp(30px, 8vw, 42px); font-weight: 700;
  letter-spacing: .01em; line-height: 1.08; margin: 6px 0 8px;
}
.spec-hero .lede { color: var(--ink-2); font-size: 15px; max-width: 44ch; }

/* Barre de sélection d'ambiance */
.amb-bar {
  display: flex; flex-wrap: wrap; align-items: center; gap: var(--sp-2);
  margin: 20px 0 8px;
}
.amb-bar .amb-label { font-size: 12px; color: var(--ink-2); margin-right: 4px; }
.amb-chip {
  min-height: 44px; padding: 0 16px;
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid var(--line); border-radius: var(--r-pill);
  background: var(--surface); color: var(--ink);
  font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background-color var(--dur-ui) ease, border-color var(--dur-ui) ease,
              transform var(--dur-ui) ease;
}
.amb-chip:hover { border-color: var(--accent); }
.amb-chip:active { transform: scale(.97); }
.amb-chip[aria-pressed="true"] {
  background: var(--accent-soft); border-color: var(--accent); color: var(--ink);
}
.amb-chip .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft);
}

/* Section */
.section { margin-top: 28px; }
.section > .eyebrow { display: block; margin-bottom: 12px; }

/* Cartes */
.card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 18px;
  box-shadow: 0 6px 20px -12px var(--shadow);
}
.card + .card { margin-top: 14px; }
.card h3 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.card p { color: var(--ink-2); font-size: 14px; }
.card-row { display: flex; align-items: center; gap: 14px; }
.thumb {
  width: 56px; height: 56px; flex: 0 0 auto; border-radius: var(--r-md);
  display: grid; place-items: center; font-size: 26px;
}
/* Vignettes = remplissage SOLIDE (motif bouton, AA garanti dans les 3 ambiances) */
.thumb.chest { background: var(--gold); color: var(--on-gold); }
.thumb.card-mem { background: var(--accent); color: var(--on-accent); }

/* Grille de domaines (tuiles) */
.tiles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.tile {
  background: var(--surface-2); border: 1px solid var(--line);
  border-radius: var(--r-md); padding: 14px; min-height: 76px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.tile .t-emoji { font-size: 22px; }
.tile .t-name { font-weight: 600; font-size: 14px; }
.tile .t-meta { color: var(--ink-2); font-size: 12px; }

/* Boutons */
.btns { display: flex; flex-wrap: wrap; gap: 10px; }
.btn {
  min-height: 48px; padding: 0 22px; border: 0; border-radius: var(--r-pill);
  background: var(--accent); color: var(--on-accent);
  font: inherit; font-size: 15px; font-weight: 700; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform var(--dur-ui) ease, filter var(--dur-ui) ease;
}
.btn:active { transform: scale(.97); }
.btn:hover { filter: brightness(1.04); }
.btn.gold { background: var(--gold); color: var(--on-gold); }
.btn.ghost {
  background: transparent; color: var(--ink);
  border: 1px solid var(--line);
}
.btn.ghost:hover { border-color: var(--accent); filter: none; }

/* Chips / étiquettes */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  min-height: 30px; padding: 0 12px; border-radius: var(--r-pill);
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; line-height: 1;
  background: var(--accent-soft); color: var(--ink);
  border: 1px solid var(--line);
}
.chip.gold { background: var(--gold-soft); }
.chip .k { font-size: 11px; color: var(--ink-2); font-weight: 600; }

/* Champ de saisie */
.field { display: block; margin-top: 4px; }
.field .lab { display: block; font-size: 12px; color: var(--ink-2); margin-bottom: 6px; }
.field input {
  width: 100%; min-height: 48px; padding: 0 14px;
  background: var(--surface); color: var(--ink);
  border: 1px solid var(--line); border-radius: var(--r-md);
  font: inherit; font-size: 15px;
  transition: border-color var(--dur-ui) ease;
}
.field input:focus { outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft); }
.field input::placeholder { color: var(--ink-2); opacity: .8; }

/* Rangées de liste + état vide */
.list { border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden; }
.row {
  display: flex; align-items: center; gap: 12px; padding: 14px 16px;
  background: var(--surface);
}
.row + .row { border-top: 1px solid var(--line); }
.row .r-emoji { font-size: 20px; }
.row .r-main { flex: 1; }
.row .r-title { font-weight: 600; font-size: 15px; }
.row .r-sub { color: var(--ink-2); font-size: 12px; }
.row .r-count { color: var(--ink-2); font-size: 13px; font-variant-numeric: tabular-nums; }
.empty {
  text-align: center; padding: 32px 20px; color: var(--ink-2);
  border: 1px dashed var(--line); border-radius: var(--r-md);
}
.empty .e-emoji { font-size: 30px; }
.empty .e-title { color: var(--ink); font-weight: 600; margin: 8px 0 4px; }

/* Légende de contraste (preuve AA) */
.legend {
  margin-top: 32px; font-size: 12px; color: var(--ink-2);
  border-top: 1px solid var(--line); padding-top: 16px; line-height: 1.7;
}
.legend code {
  font-family: ui-monospace, Menlo, Consolas, monospace;
  background: var(--accent-soft); color: var(--ink);
  padding: 1px 6px; border-radius: 6px;
}
.legend .ok { color: var(--ink); font-weight: 600; }

/* ============================ REDUCED MOTION ============================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .001ms !important;
    scroll-behavior: auto !important;
  }
}

</style>
</head>
<body>
<div id="splash" aria-hidden="true"><div class="splash-mark">ASCEND</div></div>
<div id="app"></div>

<script>
/* ASCEND v2 — store central & persistance increvable (Phase 0.2).
   Aucune UI ici : le socle de données du TDD §4, monté AVANT tout écran.
   Expose window.AscendStore (état + save/load/date) et window.__test (harnais console).

   Invariants tenus ici (CLAUDE.md / TDD §4) :
   - hydratation TYPE-VALIDÉE : une valeur corrompue est larguée, le défaut reprend,
     l'app boote TOUJOURS ;
   - migrations NON destructives ; une save de version FUTURE → refus propre (repart du seed) ;
   - rien de punitif dans le moteur de dates : le changement de jour ne fait que ré-ancrer
     la date (l'historique est daté à la création ; aucune série n'existe, rien n'est retiré) ;
   - export & suppression RÉELS (Blob téléchargé / localStorage vidé) ;
   - 0 requête réseau (localStorage + Blob local uniquement). */
(function () {
  'use strict';

  var SAVE_VERSION = 1;
  var SAVE_KEY = 'ascend2.save.v1';
  // Garde-fou de sécurité : borne le nombre de jours civils qu'un rollover prend en
  // compte (horloge sautée de plusieurs années). Le rollover v2 est O(1) — il ne fait
  // que ré-ancrer la date — donc il n'y a AUCUNE boucle par jour à faire diverger ;
  // cette borne clampe la valeur « jours écoulés » rapportée (dayRollover().advanced),
  // seule donnée qu'un futur regroupement de timeline consommera.
  var MAX_ROLL = 3660; // ~10 ans

  /* ---------------------------------------------------------------- localStorage sûr */
  // Enveloppé de try/catch : dans un contexte où localStorage est absent/bloqué
  // (navigation privée iOS pleine, sandbox), on retombe silencieusement en mémoire —
  // JAMAIS de throw au boot.
  function lsGet(k) { try { if (typeof localStorage === 'undefined' || !localStorage) return null; return localStorage.getItem(k); } catch (e) { return null; } }
  function lsSet(k, v) { try { if (typeof localStorage === 'undefined' || !localStorage) return false; localStorage.setItem(k, v); return true; } catch (e) { return false; } }
  function lsDel(k) { try { if (typeof localStorage !== 'undefined' && localStorage) localStorage.removeItem(k); } catch (e) { } }

  /* ------------------------------------------------------------------ moteur de dates */
  // Jours civils LOCAUX. dayIndex() calcule via Date.UTC sur les composantes (an/mois/jour)
  // → insensible à l'heure et au DST (deux clés du même jour → même index).
  function todayKey() {
    if (typeof Date === 'undefined') return '';
    var d = new Date();
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var j = ('0' + d.getDate()).slice(-2);
    return d.getFullYear() + '-' + m + '-' + j;
  }
  function dayIndex(key) {
    if (!key) return NaN;
    var p = ('' + key).split('-');
    if (p.length !== 3) return NaN;
    var v = Date.UTC(+p[0], (+p[1]) - 1, +p[2]);
    return isNaN(v) ? NaN : Math.floor(v / 86400000);
  }

  /* --------------------------------------------------------------------- défauts §4 */
  function defaults() {
    var today = todayKey();
    return {
      name: '',
      onboarded: false,
      createdAt: today,             // jour civil du 1er lancement (figé, persisté)
      lastDay: today,               // ancre du moteur de dates (R5 v1)
      habits: [],                   // [{id,title,domain,freq,count,createdAt}]
      objectives: [],               // [{id,title,domain,baseline,milestonesHit:[],done}]
      activeQuest: null,            // {id,startedAt} | null (vrai startedAt conservé, P0-7 v1)
      history: [],                  // [{kind,refId,domain,day,elan}]
      chests: [],                   // [{id,type,domain,sourceLabel,day}] non ouverts
      inventory: [],                // [{id,itemId,day,sourceLabel,photoId|null,note|null}]
      placements: [],               // [{invId,zone,x,y}]
      buildings: {},                // {<domain>:{placed:bool}} — le NIVEAU est DÉRIVÉ, jamais stocké
      pity: { ironSinceRare: 0 },
      settings: { reducedMotion: 'auto', theme: null }
    };
  }

  /* --------------------------------------------------------- persistance : allowlist */
  // Allowlist EXPLICITE des champs persistés (= données de jeu). Toute clé d'UI éphémère
  // (onglet, overlay, sélection…) reste hors de cette liste → jamais sérialisée.
  var PERSIST_KEYS = ['name', 'onboarded', 'createdAt', 'lastDay', 'habits', 'objectives',
    'activeQuest', 'history', 'chests', 'inventory', 'placements', 'buildings', 'pity', 'settings'];

  // Schéma de TYPE par clé. Une valeur du mauvais type est LARGUÉE au chargement (le défaut
  // reprend) → une save corrompue (history:'x', buildings:42) ne peut plus atteindre le rendu.
  var PERSIST_TYPES = {
    name: 'str', onboarded: 'bool', createdAt: 'str', lastDay: 'str?',
    habits: 'arr', objectives: 'arr', activeQuest: 'obj?', history: 'arr',
    chests: 'arr', inventory: 'arr', placements: 'arr', buildings: 'obj',
    pity: 'obj', settings: 'obj'
  };

  function _okType(v, kind) {
    switch (kind) {
      case 'num': return typeof v === 'number' && isFinite(v);
      case 'str': return typeof v === 'string';
      case 'str?': return v === null || typeof v === 'string';
      case 'bool': return typeof v === 'boolean';
      case 'arr': return Array.isArray(v);
      case 'obj': return v !== null && typeof v === 'object' && !Array.isArray(v);
      case 'obj?': return v === null || (typeof v === 'object' && !Array.isArray(v));
      default: return true; // clé hors schéma → tolérante
    }
  }
  function _isPlainObj(o) { return o !== null && typeof o === 'object' && !Array.isArray(o); }

  // Les tableaux de « records » ne gardent que des objets simples (une entrée corrompue
  // — nombre, null, tableau imbriqué — est écartée, le reste survit).
  var RECORD_ARRAYS = ['habits', 'objectives', 'history', 'chests', 'inventory', 'placements'];

  /* ---------------------------------------------------------------------- serialize */
  // Sérialise le sous-ensemble persisté (+ n° de version). Sert à l'écriture ET de
  // signature de dedup (on n'écrit pas si le blob n'a pas changé).
  function serialize(state) {
    var o = { v: SAVE_VERSION };
    for (var i = 0; i < PERSIST_KEYS.length; i++) { var k = PERSIST_KEYS[i]; o[k] = state[k]; }
    return JSON.stringify(o);
  }

  /* --------------------------------------------------------------------- migrateSave */
  // Migration NON destructive. v1 = forme courante → aucune transformation. Une save d'une
  // version PLUS RÉCENTE (v>SAVE_VERSION, ex : livrable rétrogradé) n'est pas rétro-migrable
  // → null = repart du seed (refus PROPRE, jamais de crash, jamais d'écrasement silencieux).
  // Futures montées : `if (v < 2) { …transform…; v = 2; }` ici, puis bump SAVE_VERSION.
  function migrateSave(data) {
    if (!data || typeof data !== 'object') return null;
    var v = (typeof data.v === 'number') ? data.v : 1; // toutes 1res saves sans champ v → v1
    if (v > SAVE_VERSION) return null;
    return data;
  }

  /* ------------------------------------------------------------------------ loadSave */
  // Lecture au boot : {} si absente/illisible/version future (repart du seed, jamais de crash).
  // Chaque champ est TYPE-VALIDÉ avant hydratation ; les tableaux de records sont filtrés.
  function loadSave() {
    try {
      var raw = lsGet(SAVE_KEY); if (!raw) return {};
      var data = null; try { data = JSON.parse(raw); } catch (e) { data = null; }
      data = migrateSave(data);
      if (!data) return {};
      var out = {};
      for (var i = 0; i < PERSIST_KEYS.length; i++) {
        var k = PERSIST_KEYS[i];
        if ((k in data) && _okType(data[k], PERSIST_TYPES[k])) out[k] = data[k];
      }
      for (var j = 0; j < RECORD_ARRAYS.length; j++) {
        var rk = RECORD_ARRAYS[j];
        if (Array.isArray(out[rk])) out[rk] = out[rk].filter(_isPlainObj);
      }
      return out;
    } catch (e) { return {}; }
  }

  /* --------------------------------------------------------------------------- store */
  var store = {
    state: null,
    _subs: [],
    _lastBlob: null,

    get: function () { return this.state; },

    // Mutation persistée : merge superficiel → écrit → notifie les abonnés.
    set: function (patch) {
      if (patch) for (var k in patch) if (patch.hasOwnProperty(k)) this.state[k] = patch[k];
      this.save();
      this._notify();
      return this.state;
    },

    // Mutation ÉPHÉMÈRE (UI transitoire) : ne persiste pas, notifie seulement.
    setQuiet: function (patch) {
      if (patch) for (var k in patch) if (patch.hasOwnProperty(k)) this.state[k] = patch[k];
      this._notify();
      return this.state;
    },

    // Écrit la save si le blob a changé (dedup → les frames de rendu ne provoquent
    // aucune écriture superflue).
    save: function () {
      var blob = serialize(this.state);
      if (blob === this._lastBlob) return false;
      lsSet(SAVE_KEY, blob);
      this._lastBlob = blob;
      return true;
    },

    subscribe: function (fn) {
      if (typeof fn !== 'function') return function () { };
      this._subs.push(fn);
      var self = this;
      return function () { var i = self._subs.indexOf(fn); if (i >= 0) self._subs.splice(i, 1); };
    },
    _notify: function () {
      for (var i = 0; i < this._subs.length; i++) {
        try { this._subs[i](this.state); } catch (e) { }
      }
    },

    /* --- moteur de dates (rollover DOUX, NON punitif) --- */
    // Recale `lastDay` sur le jour civil courant. Retourne {advanced} = nombre de jours
    // civils franchis (clampé MAX_ROLL, 0 si aucun). Aucune conséquence : pas de série,
    // rien n'est retiré — l'historique est déjà daté à la création.
    dayRollover: function () {
      var today = todayKey();
      if (!today) return { advanced: 0 };
      var last = this.state.lastDay;
      if (!last) { this.set({ lastDay: today }); return { advanced: 0 }; }   // 1er lancement / legacy → ancre
      if (last === today) return { advanced: 0 };                            // même jour → no-op (garde anti-réentrée)
      var elapsed = dayIndex(today) - dayIndex(last);
      if (isNaN(elapsed) || elapsed <= 0) { this.set({ lastDay: today }); return { advanced: 0 }; } // horloge en arrière → re-ancre sans conséquence
      this.set({ lastDay: today });                                          // avance → simple ré-ancrage
      return { advanced: Math.min(elapsed, MAX_ROLL) };
    },
    _bindVisibility: function () {
      if (this._visBound || typeof document === 'undefined') return;
      this._visBound = true;
      var self = this;
      document.addEventListener('visibilitychange', function () { if (!document.hidden) self.dayRollover(); });
    },

    /* --- export RÉEL (Blob JSON téléchargé, 0 réseau) --- */
    exportJson: function () {
      try {
        var pretty = JSON.stringify(JSON.parse(serialize(this.state)), null, 2);
        var blob = new Blob([pretty], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'ascend-sauvegarde-' + todayKey() + '.json';
        document.body.appendChild(a);
        a.click();
        a.parentNode && a.parentNode.removeChild(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
        return true;
      } catch (e) { return false; }
    },

    /* --- suppression RÉELLE (localStorage vidé, état ramené aux défauts) --- */
    wipe: function () {
      lsDel(SAVE_KEY);
      this.state = defaults();
      this._lastBlob = null;
      this.save();       // ré-écrit des défauts frais (createdAt = aujourd'hui)
      this._notify();
      return this.state;
    },

    /* --- boot --- */
    boot: function () {
      var loaded = loadSave();
      var st = defaults();
      for (var k in loaded) if (loaded.hasOwnProperty(k)) st[k] = loaded[k];
      this.state = st;
      this._lastBlob = null;
      this.dayRollover();  // rollover doux au boot (peut ré-ancrer lastDay)
      this.save();         // persiste (fige createdAt/lastDay d'un compte neuf ; normalise le format)
      this._bindVisibility();
      return this.state;
    },

    // Exposés pour l'UI et les tests.
    SAVE_VERSION: SAVE_VERSION,
    SAVE_KEY: SAVE_KEY,
    todayKey: todayKey,
    dayIndex: dayIndex
  };

  store.boot();
  window.AscendStore = store;

  /* --------------------------------------------------------- harnais de test console */
  // Écrit une save fabriquée dans localStorage, puis RECHARGE la page pour prouver que
  // le boot survit (état neuf · save existante · corrompue · version future).
  function _writeRaw(raw) { lsSet(SAVE_KEY, raw); }
  window.__test = {
    // seed(partial) : écrit une save valide v1 = défauts + surcharges, puis recharge.
    seed: function (partial) {
      var st = defaults();
      if (partial) for (var k in partial) if (partial.hasOwnProperty(k)) st[k] = partial[k];
      _writeRaw(serialize(st));
      location.reload();
      return 'seed écrit → reload…';
    },
    // corrupt() : JSON illisible → le boot repart du seed.
    corrupt: function () { _writeRaw('{ ceci n\'est pas: du JSON,,, '); location.reload(); return 'save corrompue (illisible) → reload…'; },
    // corruptTyped() : JSON valide mais champs mal typés → ils sont largués, les valides restent.
    corruptTyped: function () {
      var bad = { v: SAVE_VERSION, name: 'Léo', onboarded: true, history: 'PAS_UN_TABLEAU', buildings: 42, habits: [{ id: 'h1', title: 'ok' }, 999, null], settings: ['pas', 'un', 'objet'] };
      _writeRaw(JSON.stringify(bad));
      location.reload();
      return 'save mal typée écrite → reload (history/buildings/settings doivent retomber aux défauts, name/onboarded/habits[0] survivre)…';
    },
    // future() : version postérieure → migrateSave refuse → repart du seed (refus propre).
    future: function () {
      _writeRaw(JSON.stringify({ v: SAVE_VERSION + 1, name: 'DuFutur', onboarded: true }));
      location.reload();
      return 'save de version future écrite → reload (doit être refusée, boot neuf)…';
    },
    reset: function () { store.wipe(); return 'save supprimée + défauts ré-écrits.'; },
    // Inspecteurs (sans reload).
    state: function () { return store.get(); },
    dump: function () { try { return JSON.parse(lsGet(SAVE_KEY) || '{}'); } catch (e) { return { _illisible: true, raw: lsGet(SAVE_KEY) }; } },
    raw: function () { return lsGet(SAVE_KEY); },
    export: function () { return store.exportJson(); },
    // rollover(fakeLast) : force lastDay puis rejoue le rollover (test du moteur de dates).
    rollover: function (fakeLast) {
      if (typeof fakeLast === 'string') store.set({ lastDay: fakeLast });
      var r = store.dayRollover();
      return { advanced: r.advanced, lastDay: store.state.lastDay, today: todayKey() };
    }
  };
})();

/* ASCEND v2 — Moteur d'ambiance (Phase 0.3).
   Choisit le thème visuel selon l'HEURE LOCALE et l'applique via
   [data-ambiance] sur <html> (les tokens sont dans styles.css) :
     nuit        21 h → 06 h   (nuit étoilée)
     crepuscule  06 h → 08 h   (aube)  ·  19 h → 21 h  (couchant)
     jour        08 h → 19 h   (jour doux)
   Le vrai ciel animé + météo de l'île se grefferont sur ces mêmes tokens
   plus tard ; ici on ne pose que la FONDATION (thème + fondu + re-check).

   API : window.AscendAmbiance = { pick(date), apply(name), auto(), current(), mode() }.
   - auto()  : mode automatique, suit l'horloge (re-check chaque minute) ;
   - apply() : force une ambiance (mode manuel — utilisé par la page de spécimens). */
(function () {
  'use strict';
  var VALID = { jour: 1, crepuscule: 1, nuit: 1 };
  var root = document.documentElement;
  var mode = 'auto';        // 'auto' | 'manual'
  var timer = null;

  // Heure → nom d'ambiance. Bornes inclusives basses, exclusives hautes.
  function pick(date) {
    var h = (date || new Date()).getHours();
    if (h >= 21 || h < 6) return 'nuit';
    if (h < 8 || h >= 19) return 'crepuscule';   // 6–8 (aube) · 19–21 (couchant)
    return 'jour';                               // 8–19
  }

  function set(name) {
    if (!VALID[name]) name = 'jour';
    if (root.getAttribute('data-ambiance') !== name) {
      root.setAttribute('data-ambiance', name);
    }
    return name;
  }

  function auto() {
    mode = 'auto';
    var name = set(pick(new Date()));
    if (!timer) {
      // Re-check périodique : franchir une borne bascule l'ambiance en douceur
      // (le fondu est purement CSS ; coupé sous prefers-reduced-motion).
      timer = setInterval(function () { if (mode === 'auto') set(pick(new Date())); }, 60000);
    }
    return name;
  }

  function apply(name) {
    mode = 'manual';
    return set(name);
  }

  window.AscendAmbiance = {
    pick: pick,
    apply: apply,
    auto: auto,
    current: function () { return root.getAttribute('data-ambiance') || 'jour'; },
    mode: function () { return mode; }
  };

  // Applique immédiatement (avant le premier paint de app.js) : pas de flash.
  auto();
})();

/* ASCEND v2 — Racine de l'app.
   Phase 0.3 : PAGE DE SPÉCIMENS du design system (remplace le diagnostic 0.2).
   Montre les tokens sur des éléments réels (titres, cartes, boutons, chips,
   champ, liste, état vide) et laisse Leo BASCULER l'ambiance (Auto / Jour /
   Crépuscule / Nuit) pour valider les 3 directions et le fondu du ciel.
   Le store (state.js) reste intact — il boote seul, __test survit. 0.03 : build. */
(function () {
  'use strict';
  var h = window.preact.h;
  var render = window.preact.render;
  var html = window.htm.bind(h);
  var amb = window.AscendAmbiance;
  var VER = '0.03';

  var AMBIANCES = [
    { key: 'auto', label: 'Auto' },
    { key: 'jour', label: 'Jour doux' },
    { key: 'crepuscule', label: 'Aube' },
    { key: 'nuit', label: 'Nuit' }
  ];

  function selectAmbiance(key) {
    if (key === 'auto') amb.auto(); else amb.apply(key);
    paint();
  }

  function isPressed(key) {
    if (key === 'auto') return amb.mode() === 'auto';
    return amb.mode() === 'manual' && amb.current() === key;
  }

  function ambChip(a) {
    return html`
      <button class="amb-chip" type="button"
              aria-pressed=${isPressed(a.key) ? 'true' : 'false'}
              onClick=${function () { selectAmbiance(a.key); }}>
        ${a.key !== 'auto' ? html`<span class="dot" data-for=${a.key}></span>` : null}
        ${a.label}
      </button>`;
  }

  function App() {
    var current = amb.current();
    var modeLabel = amb.mode() === 'auto' ? 'auto (' + current + ')' : current + ' (manuel)';
    return html`
      <div class="sky" aria-hidden="true"></div>
      <main class="wrap">
        <header class="spec-hero">
          <div class="eyebrow">Design system · v${VER}</div>
          <h1>ASCEND</h1>
          <p class="lede">Ton île, ta collection — un monde qui n'avance que quand
          toi tu avances dans la vraie vie. Le ciel suit ton heure.</p>
        </header>

        <div class="amb-bar" role="group" aria-label="Ambiance">
          <span class="amb-label">Ambiance · ${modeLabel}</span>
          ${AMBIANCES.map(ambChip)}
        </div>

        <section class="section" aria-label="Boutons">
          <span class="eyebrow">Actions</span>
          <div class="btns">
            <button class="btn" type="button">Valider le jour</button>
            <button class="btn gold" type="button">Ouvrir le coffre</button>
            <button class="btn ghost" type="button">Plus tard</button>
          </div>
        </section>

        <section class="section" aria-label="Cartes">
          <span class="eyebrow">Cartes</span>
          <div class="card">
            <div class="card-row">
              <div class="thumb chest">🎁</div>
              <div>
                <h3>Coffre de bois</h3>
                <p>Obtenu en validant « Lire 10 pages » · aujourd'hui</p>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-row">
              <div class="thumb card-mem">🃏</div>
              <div>
                <h3>Carte-souvenir</h3>
                <p>Un fragment de ton île, gagné par un vrai effort.</p>
              </div>
            </div>
          </div>
        </section>

        <section class="section" aria-label="Domaines">
          <span class="eyebrow">Domaines</span>
          <div class="tiles">
            <div class="tile"><span class="t-emoji">📚</span>
              <div><div class="t-name">Savoir</div><div class="t-meta">niveau 2 · 14 jours</div></div></div>
            <div class="tile"><span class="t-emoji">💪</span>
              <div><div class="t-name">Corps</div><div class="t-meta">niveau 1 · 6 jours</div></div></div>
            <div class="tile"><span class="t-emoji">🎨</span>
              <div><div class="t-name">Création</div><div class="t-meta">niveau 3 · 22 jours</div></div></div>
            <div class="tile"><span class="t-emoji">🧘</span>
              <div><div class="t-name">Sérénité</div><div class="t-meta">niveau 1 · 3 jours</div></div></div>
          </div>
        </section>

        <section class="section" aria-label="Étiquettes">
          <span class="eyebrow">Chips & raretés</span>
          <div class="chips">
            <span class="chip">📚 Savoir</span>
            <span class="chip">💪 Corps</span>
            <span class="chip gold">★ Rare</span>
            <span class="chip gold">✦ Légendaire</span>
            <span class="chip"><span class="k">×</span> 12</span>
          </div>
        </section>

        <section class="section" aria-label="Champ de saisie">
          <span class="eyebrow">Saisie</span>
          <label class="field">
            <span class="lab">Nouvelle habitude</span>
            <input type="text" placeholder="Ex. Lire 10 pages" />
          </label>
        </section>

        <section class="section" aria-label="Liste">
          <span class="eyebrow">Liste</span>
          <div class="list">
            <div class="row">
              <span class="r-emoji">📚</span>
              <div class="r-main"><div class="r-title">Lire 10 pages</div>
                <div class="r-sub">Savoir · chaque jour</div></div>
              <span class="r-count">12×</span>
            </div>
            <div class="row">
              <span class="r-emoji">🏃</span>
              <div class="r-main"><div class="r-title">Courir 20 min</div>
                <div class="r-sub">Corps · 3×/semaine</div></div>
              <span class="r-count">6×</span>
            </div>
          </div>
        </section>

        <section class="section" aria-label="État vide">
          <span class="eyebrow">État vide</span>
          <div class="empty">
            <div class="e-emoji">🌱</div>
            <div class="e-title">Ton île est encore endormie</div>
            <div>Crée ta première habitude pour la réveiller.</div>
          </div>
        </section>

        <p class="legend">
          Contrastes mesurés AA contre le fond rendu (build ${VER}) :
          <span class="ok">texte</span> = <code>--ink</code> (≥ 12:1) /
          <code>--ink-2</code> (≥ 5:1) ; <code>--accent</code> & <code>--gold</code>
          en remplissage, texte posé dessus via <code>--on-accent</code> /
          <code>--on-gold</code> (≥ 5:1). Plancher 11 px · cibles ≥ 44 px ·
          reduce-motion respecté · hors-ligne (0 requête externe).
        </p>
      </main>
    `;
  }

  var mount = document.getElementById('app');
  function paint() { render(h(App), mount); }
  paint();
  document.getElementById('splash').classList.add('hidden');
})();

</script>
</body>
