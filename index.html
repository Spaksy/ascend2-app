  function ruin(p) {
    var d = p.domain;
    return html`
      <g id=${p.id} class="isl-parcelle" transform=${'translate(' + p.x + ',' + p.y + ')'}
         data-domain=${d.id} data-level="0">
        <ellipse class="isl-plot" cx="0" cy="0" rx="58" ry="27" />
        <ellipse class="isl-plot-in" cx="0" cy="-2" rx="44" ry="19" />
        <rect class="isl-ruin" x="-34" y="-30" width="11" height="24" rx="3" />
        <rect class="isl-ruin" x="-6"  y="-38" width="12" height="33" rx="3" />
        <rect class="isl-ruin" x="22"  y="-26" width="10" height="20" rx="3" />
        <circle class="isl-badge" cx="0" cy="-8" r="17" />
        <text class="isl-emoji" x="0" y="-1" text-anchor="middle">${d.emoji}</text>
        ${collTag(p.collGot, p.collTotal)}
      </g>`;
  }

  function building(p) {
    var d = p.domain;
    var L = Math.min(p.level, 6);
    var floorH = 15, bodyW = 46;
    var bodyH = 18 + (L - 1) * floorH;
    var baseY = 6;
    var topY = baseY - bodyH;
    var glowOp = Math.min(0.5, 0.12 + L * 0.06);
    var wins = [];
    for (var f = 0; f < L; f++) {
      var wy = baseY - 12 - f * floorH;
      wins.push(html`<rect class="isl-win" x="-9" y=${wy} width="6" height="8" rx="1.2" />`);
      wins.push(html`<rect class="isl-win" x="3"  y=${wy} width="6" height="8" rx="1.2" />`);
    }
    return html`
      <g id=${p.id} class="isl-parcelle isl-built" transform=${'translate(' + p.x + ',' + p.y + ')'}
         data-domain=${d.id} data-level=${p.level}>
        <ellipse class="isl-glow" cx="0" cy=${topY + bodyH * 0.35} rx=${34 + L * 9} ry=${(34 + L * 9) * 0.7}
                 style=${'opacity:' + glowOp} />
        <ellipse class="isl-plot" cx="0" cy="0" rx="58" ry="27" />
        <ellipse class="isl-plot-in" cx="0" cy="-2" rx="44" ry="19" />
        <rect class="isl-tower" x=${-bodyW / 2} y=${topY} width=${bodyW} height=${bodyH} rx="4" />
        ${wins}
        <rect class="isl-cap" x=${-bodyW / 2 - 2} y=${topY - 6} width=${bodyW + 4} height="7" rx="2" />
        <rect class="isl-stem" x="-2" y=${topY - 20} width="4" height="15" />
        <circle class="isl-badge" cx="0" cy=${topY - 26} r="15" />
        <text class="isl-emoji" x="0" y=${topY - 19} text-anchor="middle">${d.emoji}</text>
        ${collTag(p.collGot, p.collTotal)}
      </g>`;
  }

  // Emplacement LIBRE : pastille discrète en pointillés. Interactive (cible de pose) uniquement
  // quand un objet est en attente (`pending`) → elle pulse et accepte le tap.
  function freeSlotNode(slot) {
    var active = !!pending;
    return html`
      <g class="isl-slot ${active ? 'pulse' : ''}" transform=${'translate(' + slot.x + ',' + slot.y + ')'}
         data-slot=${slot.id}
         onpointerdown=${active ? function (e) { e.stopPropagation(); } : null}
         onclick=${active ? function () { placeOnSlot(slot); } : null}>
        <ellipse class="isl-deco-pad" cx="0" cy="0" rx="30" ry="14" />
        ${active ? html`<text class="isl-slot-plus" x="0" y="1" text-anchor="middle">+</text>` : null}
      </g>`;
  }

  // Déco POSÉE : pad + glyphe placeholder. Glissable (déplacer) et tappable (sélectionner).
  function placedNode(pl) {
    var st = store.get();
    var e = invEntry(st, pl.invId);
    var item = e ? cards.resolve(e.itemId) : null;
    var pos = (drag && drag.invId === pl.invId) ? drag.cur : { x: pl.x, y: pl.y };
    var special = item && cards.rarityRank(item.rarity) >= 2;
    var sel = pending && pending.invId === pl.invId;
    var name = item ? item.name : 'Objet';
    return html`
      <g key=${pl.invId} class="isl-placed ${special ? 'special' : ''} ${sel ? 'sel' : ''}"
         transform=${'translate(' + pos.x + ',' + pos.y + ')'} data-inv=${pl.invId} role="img"
         aria-label=${'Décoration posée : ' + name}
         onpointerdown=${function (ev) { onDecoDown(ev, pl.invId, { x: pl.x, y: pl.y }); }}
         onpointermove=${onDecoMove}
         onpointerup=${function (ev) { onDecoUp(ev, pl.invId, { x: pl.x, y: pl.y }); }}
         onpointercancel=${function (ev) { onDecoUp(ev, pl.invId, { x: pl.x, y: pl.y }); }}>
        <ellipse class="isl-deco-pad placed-pad" cx="0" cy="6" rx="30" ry="13" />
        <circle class="isl-pdot" cx="0" cy="-6" r="17" />
        <text class="isl-pemoji" x="0" y="-2" text-anchor="middle">${glyph(item)}</text>
      </g>`;
  }

  function Scene() {
    var st = store.get();
    var ps = parcelles();
    var placed = islePlacements(st);
    var free = freeSlots(st);
    var toPlace = unplaced(st);
    var totalLv = derive.totalBuildingLevels(st);
    var clear = Math.min(0.94, 0.72 + totalLv * 0.02).toFixed(3);
    var fogOut = Math.max(0.4, 0.9 - totalLv * 0.03).toFixed(3);
    var fit = ((WORLD.w - MAXW) / 2) + ' ' + ((WORLD.h - MAXW * AR) / 2) + ' ' + MAXW + ' ' + (MAXW * AR);
    var initBox = savedView ? (savedView.x + ' ' + savedView.y + ' ' + savedView.w + ' ' + savedView.h) : fit;

    var pendingItem = null;
    if (pending) { var pe = invEntry(st, pending.invId); pendingItem = pe ? cards.resolve(pe.itemId) : null; }

    return html`
      <div class="isl-stage">
        <svg class="isl-svg" viewBox=${initBox} preserveAspectRatio="xMidYMid meet"
             role="img" aria-label="Scène de ton île — vue décorative ; l’équivalent accessible est la vue Liste."
             ref=${initScene}>
          <defs>
            <linearGradient id="isl-sea" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="var(--sea-1)" />
              <stop offset="1" stop-color="var(--sea-2)" />
            </linearGradient>
            <radialGradient id="isl-land" cx="0.5" cy="0.42" r="0.75">
              <stop offset="0" stop-color="var(--land)" />
              <stop offset="1" stop-color="var(--land-2)" />
            </radialGradient>
            <radialGradient id="isl-fog" cx="0.5" cy="0.5" r="0.62">
              <stop offset="0" stop-color="var(--fog)" stop-opacity="0" />
              <stop offset=${clear} stop-color="var(--fog)" stop-opacity="0" />
              <stop offset="1" stop-color="var(--fog)" stop-opacity=${fogOut} />
            </radialGradient>
          </defs>

          <rect class="isl-mer" x="-80" y="-80" width=${WORLD.w + 160} height=${WORLD.h + 160} fill="url(#isl-sea)" />

          <g class="isl-land">
            <ellipse class="isl-shore" cx=${ISLE.cx} cy=${ISLE.cy + 10} rx=${ISLE.rx + 14} ry=${ISLE.ry + 12} />
            <ellipse cx=${ISLE.cx} cy=${ISLE.cy} rx=${ISLE.rx} ry=${ISLE.ry} fill="url(#isl-land)" />
          </g>

          <!-- CALQUE emplacements libres (cibles de pose quand un objet est en attente) -->
          <g class="isl-slots">${free.map(freeSlotNode)}</g>
          <!-- CALQUE parcelles (ruine dormante OU bâtiment relevé selon le niveau) -->
          <g class="isl-parcelles">${ps.map(parcelleNode)}</g>
          <!-- CALQUE décorations posées (glissables) -->
          <g class="isl-placeds">${placed.map(placedNode)}</g>

          <rect class="isl-brume" x="-80" y="-80" width=${WORLD.w + 160} height=${WORLD.h + 160} fill="url(#isl-fog)" />
        </svg>

        ${pending
          ? html`
            <div class="isl-place-bar" role="status">
              <span class="ipb-emoji" aria-hidden="true">${glyph(pendingItem)}</span>
              <span class="ipb-txt">Choisis un emplacement libre pour <strong>${pendingItem ? pendingItem.name : 'cet objet'}</strong>.</span>
              ${pending.from === 'placed'
                ? html`<button class="ipb-btn" type="button" onClick=${rangePending}
                          aria-label=${'Ranger ' + (pendingItem ? pendingItem.name : 'cet objet') + ' dans ta collection'}>Ranger</button>`
                : null}
              <button class="ipb-btn ghost" type="button" onClick=${cancelPending} aria-label="Annuler le placement">Annuler</button>
            </div>`
          : html`<div class="isl-hint" aria-hidden="true">Touche un bâtiment pour ouvrir son domaine · glisse pour explorer</div>`}

        <button class="isl-recenter" type="button" onClick=${recenter} aria-label="Recentrer la vue de l’île">Recentrer</button>

        ${toPlace.length
          ? html`
            <div class="isl-tray" role="group" aria-label=${'Objets à placer (' + toPlace.length + ')'}>
              <div class="itray-head">À placer · ${toPlace.length}</div>
              <div class="itray-scroll">
                ${toPlace.map(function (e) {
                  var it = cards.resolve(e.itemId);
                  var on = pending && pending.from === 'tray' && pending.invId === e.id;
                  return html`
                    <button type="button" class="itray-item ${on ? 'on' : ''}"
                            aria-pressed=${on ? 'true' : 'false'}
                            aria-label=${'Placer « ' + it.name + ' » sur l’île'}
                            onClick=${function () { selectFromTray(e.id); }}>
                      <span class="iti-emoji" aria-hidden="true">${glyph(it)}</span>
                      <span class="iti-name">${it.name}</span>
                    </button>`;
                })}
              </div>
            </div>`
          : (totalLv === 0
            ? html`
              <div class="isl-wake" role="note">
                <span class="iw-emoji" aria-hidden="true">🌱</span>
                <p>Ton île s’éveille. Ces fondations en ruines attendent que ton élan les relève —
                et bientôt, les objets de tes coffres viendront la décorer.</p>
              </div>`
            : null)}
      </div>`;
  }

  /* ------------------------------------------------------------- vue LISTE (miroir 1:1)
     Équivalent sémantique complet de la scène — le placement y est possible SANS le doigt :
     sélecteur d'emplacement + boutons Placer / Déplacer / Ranger. */
  function slotLabel(i) { return 'Emplacement ' + (i + 1); }

  function ListPlaceControl(st, invId, isMove) {
    var free = freeSlots(st);
    if (!free.length) return html`<span class="ipl-none">Aucun emplacement libre — fais grandir tes bâtiments pour en débloquer.</span>`;
    var cur = (typeof listSel[invId] === 'number' && free.some(function (s) { return s.index === listSel[invId]; }))
      ? listSel[invId] : free[0].index;
    return html`
      <div class="isl-place-ctl">
        <label class="ipl-lab" for=${'sel-' + invId}>Emplacement</label>
        <select id=${'sel-' + invId} class="isl-select" onChange=${function (ev) { listSel[invId] = +ev.target.value; repaint(); }}>
          ${free.map(function (s) {
            return html`<option value=${s.index} selected=${s.index === cur ? true : null}>${slotLabel(s.index)}</option>`;
          })}
        </select>
        <button class="btn ipl-go" type="button"
                aria-label=${(isMove ? 'Déplacer vers ' : 'Placer sur ') + slotLabel(cur)}
                onClick=${function () { var s = SLOTS[cur]; actions.putOnIsland(invId, s.x, s.y); }}>${isMove ? 'Déplacer' : 'Placer'}</button>
      </div>`;
  }

  function List() {
    var st = store.get();
    var ps = parcelles();
    var placed = islePlacements(st);
    var toPlace = unplaced(st);
    var slots = slotState(st);
    var freeCount = slots.filter(function (s) { return !s.occupant; }).length;
    return html`
      <div class="isl-list">
        <p class="isl-list-lead">Vue liste de ton île — équivalent complet de la scène. Tu peux y
        placer, déplacer et ranger tes décorations sans passer par le doigt.</p>

        <h3 class="isl-list-h">Parcelles de domaine (5)</h3>
        <ul class="isl-items">
          ${ps.map(function (p) {
            var built = p.level >= 1;
            var state = built
              ? ('Niveau ' + p.level + ' · élan ' + p.elan + ' · plus que ' + p.remaining + ' avant le niveau ' + (p.level + 1))
              : 'Fondation en ruines · en sommeil';
            var aria = built
              ? ('Parcelle ' + p.domain.label + ' — bâtiment de niveau ' + p.level + ', élan ' + p.elan +
                 '. Plus que ' + p.remaining + ' d’élan avant le niveau ' + (p.level + 1) + '.')
              : ('Parcelle ' + p.domain.label + ' — fondation en ruines, en sommeil. Le bâtiment s’élèvera avec ton élan.');
            return html`
              <li class="isl-item ${built ? 'built' : ''}" tabindex="0" aria-label=${aria}>
                <span class="ii-emoji" aria-hidden="true">${p.domain.emoji}</span>
                <span class="ii-main">
                  <span class="ii-title">${p.domain.label}${built ? html`<span class="ii-lv">Nv ${p.level}</span>` : null}</span>
                  <span class="ii-state">${state}</span>
                  <div class="ii-actions">
                    <button class="lnk dm-open" type="button"
                            aria-label=${'Ouvrir le domaine ' + p.domain.label + ' — collection ' + p.collGot + ' sur ' + p.collTotal}
                            onClick=${function () { openDomain(p.domain.id); }}>Voir le domaine · ${p.collGot}/${p.collTotal}</button>
                  </div>
                </span>
              </li>`;
          })}
        </ul>

        <h3 class="isl-list-h">Décorations sur ton île (${placed.length})</h3>
        ${placed.length
          ? html`<ul class="isl-items">
              ${placed.map(function (pl) {
                var e = invEntry(st, pl.invId);
                var it = e ? cards.resolve(e.itemId) : null;
                var name = it ? it.name : 'Objet';
                var idx = -1;
                for (var i = 0; i < slots.length; i++) if (Math.abs(slots[i].x - pl.x) < 0.5 && Math.abs(slots[i].y - pl.y) < 0.5) { idx = slots[i].index; break; }
                var where = idx >= 0 ? slotLabel(idx) : 'Sur l’île';
                return html`
                  <li class="isl-item placed-item" aria-label=${'Décoration « ' + name + ' » sur ' + where + '.'}>
                    <span class="ii-emoji" aria-hidden="true">${glyph(it)}</span>
                    <span class="ii-main">
                      <span class="ii-title">${name}</span>
                      <span class="ii-state">${where}</span>
                      <div class="ii-actions">
                        ${ListPlaceControl(st, pl.invId, true)}
                        <button class="lnk" type="button" aria-label=${'Ranger « ' + name + ' » dans ta collection'}
                                onClick=${function () { actions.takeOffIsland(pl.invId); }}>Ranger</button>
                      </div>
                    </span>
                  </li>`;
              })}
            </ul>`
          : html`<p class="isl-empty-note">Rien de posé pour l’instant — place un objet ci-dessous.</p>`}

        <h3 class="isl-list-h">Objets à placer (${toPlace.length})</h3>
        ${toPlace.length
          ? html`<ul class="isl-items">
              ${toPlace.map(function (e) {
                var it = cards.resolve(e.itemId);
                return html`
                  <li class="isl-item" aria-label=${'Objet à placer : « ' + it.name + ' ».'}>
                    <span class="ii-emoji" aria-hidden="true">${glyph(it)}</span>
                    <span class="ii-main">
                      <span class="ii-title">${it.name}</span>
                      <span class="ii-state">${e.sourceLabel || 'Dans ta collection'}</span>
                      <div class="ii-actions">${ListPlaceControl(st, e.id, false)}</div>
                    </span>
                  </li>`;
              })}
            </ul>`
          : html`<p class="isl-empty-note">Tous tes objets sont posés — ouvre de nouveaux coffres pour en obtenir d’autres.</p>`}

        <h3 class="isl-list-h">Emplacements (${slots.length})</h3>
        <p class="isl-empty-note">${freeCount} libre${freeCount > 1 ? 's' : ''} sur ${slots.length}. Chaque niveau de
        bâtiment gagné débloque un nouvel emplacement (jusqu’à ${SLOTS.length}).</p>
      </div>`;
  }

  /* ------------------------------------------------------- menu du domaine (Phase 3.1)
     Ouvert en tapant un bâtiment (ou via la vue Liste). Première brique du cap « l'île =
     lobby » : le hub d'un domaine. En 3.1 il contient l'état du bâtiment + SA COLLECTION
     (obtenues avec souvenir · manquantes en silhouettes · X/Y · détail). Habitudes & quêtes
     du domaine viendront s'y greffer dans les phases suivantes. Dialog focus-trappé, Échap
     ferme (ou revient au grille depuis le détail). */
  function CollCard(c) {
    if (!c.obtained) {
      return html`
        <li class="dm-card locked" aria-label=${'À découvrir — un objet ' + cards.rarityLabel(c.rarity) + ' de ce domaine, pas encore obtenu.'}>
          <span class="dmc-emoji" aria-hidden="true">◈</span>
          <span class="dmc-name">À découvrir</span>
          <span class="rc-rarity rc-rarity--${c.rarity} dim">${cards.rarityLabel(c.rarity)}</span>
        </li>`;
    }
    var item = cards.resolve(c.id);
    return html`
      <li>
        <button class="dm-card got" type="button"
                aria-label=${'Obtenu : ' + c.name + ' (' + cards.rarityLabel(c.rarity) + '). Voir le souvenir.'}
                onClick=${function () { showDetail(c.entry.id); }}>
          <span class="dmc-emoji" aria-hidden="true">${glyph(item)}</span>
          <span class="dmc-name">${c.name}</span>
          <span class="rc-rarity rc-rarity--${c.rarity}">${cards.rarityLabel(c.rarity)}</span>
        </button>
      </li>`;
  }
  function ExtraCard(x) {
    var item = x.item;
    return html`
      <li>
        <button class="dm-card got" type="button"
                aria-label=${'Obtenu : ' + item.name + '. Voir le souvenir.'}
                onClick=${function () { showDetail(x.entry.id); }}>
          <span class="dmc-emoji" aria-hidden="true">${glyph(item)}</span>
          <span class="dmc-name">${item.name}</span>
          <span class="rc-rarity rc-rarity--${item.rarity}">${cards.rarityLabel(item.rarity)}</span>
        </button>
      </li>`;
  }
  function CollectionView(st, coll) {
    return html`
      <div class="dm-body">
        <div class="dm-collhead">
          <h3 class="dm-h">Collection</h3>
          <span class="dm-count" aria-label=${coll.got + ' objets du catalogue obtenus sur ' + coll.total}>${coll.got}/${coll.total}</span>
        </div>
        <p class="dm-note">Chaque objet obtenu garde le souvenir de l’action réelle qui l’a mérité.
        Les silhouettes restent à découvrir — rien ne presse.</p>
        <ul class="dm-grid">${coll.catalogue.map(CollCard)}</ul>
        ${coll.extra.length
          ? html`
            <h3 class="dm-h dm-h-extra">Et aussi · ${coll.extra.length}</h3>
            <p class="dm-note">Des trouvailles hors-catalogue (décos, jalons) que tu as méritées dans ce domaine.</p>
            <ul class="dm-grid">${coll.extra.map(ExtraCard)}</ul>`
          : null}
      </div>`;
  }
  function DetailView(st) {
    var e = invEntry(st, detailInvId);
    if (!e) { detailInvId = null; return CollectionView(st, domainCollection(st, openDomainId)); }
    var item = cards.resolve(e.itemId);
    var d = domains.get(item.domain);
    var meta = (d ? d.label : (item.domain || '—')) + ' · ' + cards.rarityLabel(item.rarity) + ' · obtenu le ' + e.day;
    return html`
      <div class="dm-body dm-detail">
        <button class="dm-back" type="button" onClick=${backToGrid} aria-label="Retour à la collection">← Retour</button>
        <div class="dm-detail-card">
          <span class="dmd-emoji" aria-hidden="true">${glyph(item)}</span>
          <div class="dmd-name">${item.name}</div>
          <span class="rc-rarity rc-rarity--${item.rarity}">${cards.rarityLabel(item.rarity)}</span>
        </div>
        <div class="dm-detail-info">
          <h4 class="dmd-h">Son histoire</h4>
          <p class="dmd-story">${storyFor(item)}</p>
          <h4 class="dmd-h">Souvenir</h4>
          <p class="dmd-meta">${meta}</p>
          <p class="dmd-src">${e.sourceLabel || 'Dans ta collection'}</p>
        </div>
      </div>`;
  }
  function DomainMenu() {
    var st = store.get();
    var dom = domains.get(openDomainId);
    if (!dom) return null;
    var info = derive.buildingInfo(st, openDomainId);
    var stateLine = info.level >= 1
      ? ('Niveau ' + info.level + ' · élan ' + info.elan + ' · plus que ' + info.remaining + ' avant le niveau ' + (info.level + 1))
      : 'Fondation en sommeil — relève-la par tes actions de ce domaine';
    return html`
      <div class="dom-menu" role="dialog" aria-modal="true" aria-label=${'Domaine ' + dom.label}
           onKeyDown=${function (e) { if (e.key === 'Escape') { if (detailInvId) backToGrid(); else closeDomain(); } }}>
        <div class="dm-backdrop" onClick=${closeDomain} aria-hidden="true"></div>
        <div class="dm-panel" tabindex="-1" ref=${focusPanel}>
          <header class="dm-head">
            <span class="dm-emoji" aria-hidden="true">${dom.emoji}</span>
            <div class="dm-headmain">
              <h2 class="dm-title">${dom.label}</h2>
              <p class="dm-state">${stateLine}</p>
            </div>
            <button class="dm-close" type="button" aria-label="Fermer" onClick=${closeDomain}>✕</button>
          </header>
          ${detailInvId ? DetailView(st) : CollectionView(st, domainCollection(st, openDomainId))}
        </div>
      </div>`;
  }

  /* --------------------------------------------------------------------- écran complet */
  function Screen(ctx) {
    repaint = (ctx && typeof ctx.repaint === 'function') ? ctx.repaint : function () {};
    var view = ctx.view === 'liste' ? 'liste' : 'scene';
    return html`
      <main class="island-screen">
        <header class="island-top">
          <div class="eyebrow">ASCEND · v${ctx.ver} · Ton île</div>
          <div class="seg" role="group" aria-label="Affichage de l’île">
            <button type="button" class="seg-btn" aria-pressed=${view === 'scene' ? 'true' : 'false'}
                    onClick=${function () { ctx.onView('scene'); }}>Scène</button>
            <button type="button" class="seg-btn" aria-pressed=${view === 'liste' ? 'true' : 'false'}
                    onClick=${function () { ctx.onView('liste'); }}>Liste</button>
          </div>
        </header>
        ${view === 'scene' ? Scene() : List()}
        ${openDomainId ? DomainMenu() : null}
      </main>`;
  }

  window.AscendIsland = { Screen: Screen };
})();

/* ASCEND v2 — Racine de l'app.
   Phase 1.1 : PREMIER VRAI ÉCRAN — Habitudes (créer, lister, éditer, supprimer,
   valider le jour). Remplace la page de spécimens 0.3 (les styles restent la banque
   du design system). L'ambiance suit désormais l'heure automatiquement (ambiance.js).

   État d'UI éphémère (formulaires, édition, confirmation) = variables de module,
   JAMAIS persistées (le store ne voit que les mutations métier via AscendActions).
   Re-rendu : abonnement au store (mutations) + paint() explicite (frappe clavier). */
(function () {
  'use strict';
  var h = window.preact.h;
  var render = window.preact.render;
  var html = window.htm.bind(h);
  var store = window.AscendStore;
  var actions = window.AscendActions;
  var derive = window.AscendDerive;
  var domains = window.AscendDomains;
  var chestTypes = window.AscendChests;
  var cards = window.AscendCards;
  var quests = window.AscendQuests;
  var island = window.AscendIsland;
  var VER = '0.12';

  var DURATION_PRESETS = [5, 10, 15, 20, 30, 45, 60, 90]; // minutes proposées (perso) — GDD §13.

  /* ------------------------------------------------------------ état d'UI éphémère */
  var ui = {
    tab: 'habitudes',           // 'habitudes' | 'ile' — onglet courant (jamais persisté)
    islandView: 'scene',        // 'scene' | 'liste' — bascule de la scène île (Phase 2.1)
    form: { title: '', domain: domains.list[0].id, freq: '' },
    editingId: null,
    edit: { title: '', domain: '', freq: '' },
    confirmDeleteId: null,
    milestoneDone: null,      // { threshold, chestLabel } — bandeau doux après un jalon franchi
    levelDone: null,          // { level, domainLabel, count } — bandeau doux après une montée de niveau (Phase 2.2)
    ceremony: null,           // { phase:'suspense'|'reveal', chestType, item, sourceLabel } | null
    quest: {
      domain: domains.list[0].id,                                   // filtre du catalogue
      perso: { title: '', domain: domains.list[0].id, minutes: 20 },// quête personnalisée
      confirmAbandon: false,
      done: null              // { label } — bandeau doux après un accomplissement (guide vers la pile)
    }
  };
  function resetForm() { ui.form = { title: '', domain: domains.list[0].id, freq: '' }; }
  function resetPerso() { ui.quest.perso = { title: '', domain: domains.list[0].id, minutes: 20 }; }

  // Chrono d'affichage : tant qu'une quête VALIDE tourne, on repeint chaque seconde pour
  // faire descendre le compte à rebours (aucune écriture — juste un paint dérivé de Date.now()).
  var questTick = null;
  function syncQuestTick() {
    var active = derive.isValidActiveQuest(store.get().activeQuest);
    if (active && !questTick) { questTick = setInterval(paint, 1000); }
    else if (!active && questTick) { clearInterval(questTick); questTick = null; }
  }
  // mm:ss d'une durée en ms (arrondi au plafond → le rebours n'affiche 0:00 qu'une fois écoulé).
  function fmtClock(ms) {
    var s = Math.max(0, Math.ceil(ms / 1000));
    var m = Math.floor(s / 60);
    return m + ':' + ('0' + (s % 60)).slice(-2);
  }

  var ceremonyTimer = null;
  // Respecte le réglage système : reduce-motion → cérémonie INSTANTANÉE (pas de suspense).
  function prefersReduced() {
    try { return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches); }
    catch (e) { return false; }
  }

  /* ------------------------------------------------------------------- handlers */
  function onCreateSubmit(e) {
    if (e && e.preventDefault) e.preventDefault();
    var created = actions.createHabit(ui.form.title, ui.form.domain, ui.form.freq);
    if (created) resetForm();
    paint();
  }
  // Valider une habitude. Si la validation FRANCHIT un jalon (Phase 1.5), on lève le bandeau
  // doux qui guide vers la pile (le coffre de jalon y attend, à côté du Coffre de bois).
  function validate(id) {
    var res = actions.validateHabit(id);
    if (res && res.ok && res.milestone) {
      var t = chestTypes.get(res.milestone.tier);
      ui.milestoneDone = { threshold: res.milestone.threshold, chestLabel: t ? t.label : 'un coffre' };
    }
    noteLevelUps(res);                                  // Phase 2.2 : bandeau doux si un niveau est franchi
    paint();                                            // store.set a déjà notifié ; ce paint pose le bandeau
  }

  // Pose le bandeau doux « montée de niveau » (Phase 2.2) à partir du résultat d'une action.
  // Célébration SOBRE (arbitrage Leo) : on cite le niveau le plus haut atteint et le nombre de
  // Coffres de cristal tombés dans « À découvrir ». Non bloquant, dismissible, jamais punitif.
  function noteLevelUps(res) {
    if (!res || !res.ok || !res.levelUps || !res.levelUps.length) return;
    var top = res.levelUps[res.levelUps.length - 1];    // le niveau le plus élevé franchi
    var d = domains.get(top.domain);
    ui.levelDone = { level: top.level, domainLabel: d ? d.label : top.domain, count: res.levelUps.length };
  }

  /* --- ouverture de coffre : la cérémonie (Phase 1.3) --- */
  // On MUTE d'abord (openChest fige le tirage en inventory) puis on JOUE la présentation :
  // ainsi la récompense est en sûreté même si l'utilisateur ferme au milieu. Suspense doux
  // (~1,5 s) → révélation ; skippable ; instantané en reduce-motion.
  function openChest(chestId) {
    var res = actions.openChest(chestId);
    if (!res || !res.ok) { paint(); return; }       // introuvable (déjà ouvert) → no-op propre
    if (ceremonyTimer) { clearTimeout(ceremonyTimer); ceremonyTimer = null; }
    var reduce = prefersReduced();
    ui.ceremony = {
      phase: reduce ? 'reveal' : 'suspense',
      chestType: res.chestType, item: res.item, sourceLabel: res.sourceLabel
    };
    paint();
    if (!reduce) {
      ceremonyTimer = setTimeout(function () {
        if (ui.ceremony && ui.ceremony.phase === 'suspense') { ui.ceremony.phase = 'reveal'; paint(); }
        ceremonyTimer = null;
      }, 1500);
    }
  }
  function skipCeremony() {
    if (ceremonyTimer) { clearTimeout(ceremonyTimer); ceremonyTimer = null; }
    if (ui.ceremony && ui.ceremony.phase === 'suspense') { ui.ceremony.phase = 'reveal'; paint(); }
  }
  function closeCeremony() {
    if (ceremonyTimer) { clearTimeout(ceremonyTimer); ceremonyTimer = null; }
    ui.ceremony = null; paint();
  }

  /* --- quêtes minutées (Phase 1.4) --- */
  function startCatalogueQuest(q) {
    actions.startQuest({ questId: q.id, title: q.title, domain: q.domain, minutes: q.minutes });
    ui.quest.done = null; ui.quest.confirmAbandon = false;
    paint();
  }
  function startPersoQuest() {
    var p = ui.quest.perso;
    var res = actions.startQuest({ questId: null, title: p.title, domain: p.domain, minutes: p.minutes });
    if (res && res.ok) { resetPerso(); ui.quest.done = null; ui.quest.confirmAbandon = false; }
    paint();
  }
  function finishActiveQuest() {
    var res = actions.finishQuest();
    if (res && res.ok) {
      var t = chestTypes.get(res.tier);
      ui.quest.done = { label: t ? t.label : 'un coffre' };
      ui.quest.confirmAbandon = false;
      noteLevelUps(res);                                // Phase 2.2 : bandeau doux si un niveau est franchi
    }
    paint();
  }
  function askAbandon() { ui.quest.confirmAbandon = true; paint(); }
  function cancelAbandon() { ui.quest.confirmAbandon = false; paint(); }
  function confirmAbandon() { actions.abandonQuest(); ui.quest.confirmAbandon = false; paint(); }

  function startEdit(hb) {
    ui.editingId = hb.id;
    ui.edit = { title: hb.title, domain: hb.domain, freq: hb.freq || '' };
    ui.confirmDeleteId = null;
    paint();
  }
  function saveEdit(id) {
    if (actions.editHabit(id, { title: ui.edit.title, domain: ui.edit.domain, freq: ui.edit.freq })) {
      ui.editingId = null;
    }
    paint();
  }
  function cancelEdit() { ui.editingId = null; paint(); }

  function askDelete(id) { ui.confirmDeleteId = id; paint(); }
  function cancelDelete() { ui.confirmDeleteId = null; paint(); }
  function confirmDelete(id) { ui.confirmDeleteId = null; actions.deleteHabit(id); paint(); }

  /* --------------------------------------------------------------- composants */
  function DomainChips(selectedId, onPick) {
    return html`
      <div class="dom-select" role="group" aria-label="Domaine">
        ${domains.list.map(function (d) {
          var on = d.id === selectedId;
          return html`
            <button type="button" class="dom-chip" aria-pressed=${on ? 'true' : 'false'}
                    onClick=${function () { onPick(d.id); }}>
              <span class="d-emoji" aria-hidden="true">${d.emoji}</span>${d.label}
            </button>`;
        })}
      </div>`;
  }

  function Creator() {
    return html`
      <form class="creator" onSubmit=${onCreateSubmit}>
        <label class="lab" for="new-habit">Nouvelle habitude</label>
        <input id="new-habit" class="in" type="text" value=${ui.form.title}
               placeholder="Ex. Lire 10 pages" aria-label="Titre de la nouvelle habitude"
               autocomplete="off"
               onInput=${function (e) { ui.form.title = e.target.value; paint(); }} />
        <span class="lab2">Domaine</span>
        ${DomainChips(ui.form.domain, function (id) { ui.form.domain = id; paint(); })}
        <input class="in" type="text" value=${ui.form.freq}
               placeholder="À quel rythme ? Ex. chaque jour, 3×/semaine, quand je peux"
               aria-label="Fréquence, libre et facultative" autocomplete="off"
               onInput=${function (e) { ui.form.freq = e.target.value; paint(); }} />
        <button class="btn" type="submit" disabled=${!ui.form.title.trim()}>Ajouter l’habitude</button>
      </form>`;
  }

  function EditCard(hb) {
    return html`
      <div class="habit editing">
        <label class="lab">Titre</label>
        <input class="in" type="text" value=${ui.edit.title} aria-label="Titre" autocomplete="off"
               onInput=${function (e) { ui.edit.title = e.target.value; paint(); }} />
        <span class="lab2">Domaine</span>
        ${DomainChips(ui.edit.domain, function (id) { ui.edit.domain = id; paint(); })}
        <label class="lab" style="margin-top:14px">Fréquence</label>
        <input class="in" type="text" value=${ui.edit.freq} placeholder="Ex. chaque jour"
               aria-label="Fréquence, libre et facultative" autocomplete="off"
               onInput=${function (e) { ui.edit.freq = e.target.value; paint(); }} />
        <div class="edit-actions">
          <button class="btn" type="button" disabled=${!ui.edit.title.trim()}
                  onClick=${function () { saveEdit(hb.id); }}>Enregistrer</button>
          <button class="btn ghost" type="button" onClick=${cancelEdit}>Annuler</button>
        </div>
      </div>`;
  }

  function HabitCard(hb) {
    if (ui.editingId === hb.id) return EditCard(hb);
    var st = store.get();
    var count = derive.habitCount(st, hb.id);
    var done = derive.isHabitValidatedOn(st, hb.id, store.todayKey());
    var next = derive.nextMilestone(count);            // prochain jalon (invitation, non punitif)
    var d = domains.get(hb.domain);
    var sub = (d ? d.label : hb.domain) + (hb.freq ? ' · ' + hb.freq : '');
    return html`
      <div class="habit">
        <div class="habit-head">
          <span class="h-emoji" aria-hidden="true">${d ? d.emoji : '•'}</span>
          <div class="h-main">
            <div class="h-title">${hb.title}</div>
            <div class="h-sub">${sub}</div>
          </div>
          ${count > 0
            ? html`<span class="h-count" aria-label=${'validée ' + count + ' fois'}>
                     ${count}<span class="u">fois</span></span>`
            : null}
        </div>
        ${count >= 1 && next
          ? html`<div class="h-goal" aria-label=${'Plus que ' + next.remaining + ' avant le jalon des ' + next.threshold}>
                   <span class="hg-ico" aria-hidden="true">🏆</span>
                   <span>Plus que <strong>${next.remaining}</strong> avant le jalon des ${next.threshold}</span>
                 </div>`
          : null}
        <div class="habit-foot">
          ${done
            ? html`<span class="done" role="status">Fait ✓</span>`
            : html`<button class="btn val" type="button"
                     onClick=${function () { validate(hb.id); }}>Je l’ai fait</button>`}
          <div class="h-actions">
            <button class="lnk" type="button" onClick=${function () { startEdit(hb); }}
                    aria-label=${'Modifier ' + hb.title}>Modifier</button>
            <button class="lnk" type="button" onClick=${function () { askDelete(hb.id); }}
                    aria-label=${'Supprimer ' + hb.title}>Supprimer</button>
          </div>
        </div>
        ${ui.confirmDeleteId === hb.id
          ? html`
            <div class="del-confirm" role="group" aria-label="Confirmer la suppression">
              <span class="msg">Supprimer « ${hb.title} » ?</span>
              <button class="btn" type="button"
                      onClick=${function () { confirmDelete(hb.id); }}>Oui, supprimer</button>
              <button class="btn ghost" type="button" onClick=${cancelDelete}>Annuler</button>
            </div>`
          : null}
      </div>`;
  }

  // Bandeau doux après un JALON franchi (Phase 1.5) — même grammaire que « quête accomplie » :
  // célèbre le cap, guide vers la pile « À découvrir », dismissible, jamais culpabilisant.
  function MilestoneBanner() {
    var m = ui.milestoneDone;
    if (!m) return null;
    return html`
      <div class="milestone-done" role="status">
        <span>✨ Jalon des <strong>${m.threshold}</strong> franchi — ton <strong>${m.chestLabel}</strong>${' '}
        t’attend plus bas, dans « À découvrir ».</span>
        <button class="lnk" type="button"
                onClick=${function () { ui.milestoneDone = null; paint(); }}>OK</button>
      </div>`;
  }

  // Bandeau doux après une MONTÉE DE NIVEAU (Phase 2.2) — même grammaire que jalon/quête :
  // célèbre le cap du bâtiment, guide vers la pile « À découvrir » où t'attend le Coffre de
  // cristal, dismissible, jamais culpabilisant. Célébration SOBRE (arbitrage Leo).
  function LevelBanner() {
    var m = ui.levelDone;
    if (!m) return null;
    var plural = m.count > 1;
    return html`
      <div class="milestone-done level-done" role="status">
        <span>🏛️ Ton <strong>${m.domainLabel}</strong> atteint le <strong>niveau ${m.level}</strong> —
        ${plural ? 'des Coffres de cristal t’attendent' : 'un Coffre de cristal t’attend'} plus bas, dans « À découvrir ».</span>
        <button class="lnk" type="button"
                onClick=${function () { ui.levelDone = null; paint(); }}>OK</button>
      </div>`;
  }

  function EmptyState() {
    return html`
      <div class="empty">
        <div class="e-emoji" aria-hidden="true">🌱</div>
        <div class="e-title">Ton île attend sa première graine</div>
        <p>Crée une habitude que tu veux faire souvent — elle réveillera ton île.</p>
      </div>`;
  }

  /* ------------------------------------------------------- coffres (Phase 1.2) */
  // Une entrée de la pile : vignette placeholder + type + libellé de source.
  // Non interactive : en 1.2 le coffre s'affiche seulement (l'ouverture = Phase 1.3).
  function ChestCard(c) {
    var t = chestTypes.get(c.type);
    var typeLabel = t ? t.label : 'Coffre';
    return html`
      <li class="chest">
        <span class="chest-vig chest-vig--${c.type}" aria-hidden="true"></span>
        <div class="chest-main">
          <div class="chest-title">${typeLabel}</div>
          <div class="chest-src">${c.sourceLabel}</div>
        </div>
        <button class="btn gold chest-open" type="button"
                aria-label=${'Ouvrir : ' + typeLabel}
                onClick=${function () { openChest(c.id); }}>Ouvrir</button>
      </li>`;
  }

  // Pile SEREINE : pas de badge rouge, pas de compteur culpabilisant, pas d'« ouvre
  // vite ». Absente tant qu'il n'y a aucun coffre (0 coffre = rien ne s'affiche → état
  // vide serein). Les plus récents en haut ; c'est déjà une vue liste accessible.
  function ChestPile() {
    var list = (store.get().chests || []).filter(function (c) { return c && c.id; });
    if (!list.length) return null;
    var display = list.slice().reverse();
    return html`
      <section class="section chest-section" aria-label="Coffres à découvrir">
        <h2 class="sec-title">À découvrir</h2>
        <p class="sec-note">Tes coffres s’accumulent tranquillement — chacun garde le
        souvenir de ce que tu as accompli. Rien ne presse.</p>
        <ul class="chest-list">${display.map(ChestCard)}</ul>
      </section>`;
  }

  /* ------------------------------------------------ carte-récompense (placeholder) */
  // Placeholder géométrique propre (les SVG Claude Design la remplaceront, jamais
  // redessinés). En 1.3 seule la rareté « commun » est produite → seule elle est stylée.
  function RewardCard(item) {
    var d = domains.get(item.domain);
    return html`
      <div class="reward-card">
        <span class="rc-emoji" aria-hidden="true">${d ? d.emoji : '✨'}</span>
        <div class="rc-name">${item.name}</div>
        <span class="rc-rarity rc-rarity--${item.rarity}">${cards.rarityLabel(item.rarity)}</span>
      </div>`;
  }

  // La cérémonie (< 6 s, skippable, instantanée en reduce-motion) : suspense doux →
  // révélation « Tu as obtenu … » → la carte rejoint la collection (bouton doré).
  function Ceremony() {
    var c = ui.ceremony;
    if (!c) return null;
    var suspense = c.phase === 'suspense';
    return html`
      <div class="ceremony" role="dialog" aria-modal="true" aria-label="Ouverture d’un coffre"
           onClick=${suspense ? skipCeremony : null}>
        ${suspense
          ? html`
            <div class="cer-stage">
              <span class="cer-chest chest-vig chest-vig--${c.chestType}" aria-hidden="true"></span>
              <p class="cer-hint">Ouverture…
                <button class="cer-skip" type="button"
                        onClick=${function (e) { if (e && e.stopPropagation) e.stopPropagation(); skipCeremony(); }}>Passer</button>
              </p>
            </div>`
          : html`
            <div class="cer-stage cer-reveal" role="status">
              <p class="cer-kicker">Tu as obtenu</p>
              ${RewardCard(c.item)}
              <p class="cer-src">${c.sourceLabel}</p>
              <button class="btn gold" type="button" onClick=${closeCeremony}>Rejoindre ma collection</button>
            </div>`}
      </div>`;
  }

  /* ------------------------------------------------ quêtes minutées (Phase 1.4) */
  // Carte de la quête EN COURS : anneau de progression + compte à rebours (arbitrage Leo).
  // L'anneau se remplit vers la durée CIBLE et passe au DORÉ à 50 % (gate débloqué). Le
  // bouton « J'ai fini » reste grisé avant 50 % avec « encore ~X min » (non punitif) ; abandon
  // possible à tout moment, sans rien retirer. Le chrono est RÉEL (repris après reload).
  function ActiveQuestCard(aq) {
    var prog = derive.questProgress(aq, Date.now());
    var deg = Math.round(prog.progress * 360);
    var ringCol = prog.gateReached ? 'var(--gold)' : 'var(--accent)';
    var ringStyle = 'background: conic-gradient(' + ringCol + ' ' + deg + 'deg, var(--line) ' + deg + 'deg);';
    var d = domains.get(aq.domain);
    var gateMin = Math.max(1, Math.ceil(prog.remainingToGateMs / 60000));
    var aria = 'Quête en cours : ' + aq.title + '. Temps restant ' + fmtClock(prog.remainingToTargetMs) +
      '. ' + (prog.gateReached ? 'Tu peux valider.' : 'Encore environ ' + gateMin + ' minutes avant de pouvoir valider.');
    return html`
      <div class="active-quest" role="group" aria-label=${aria}>
        <div class="aq-head">
          <div class="qring ${prog.gateReached ? 'ready' : ''}" style=${ringStyle} aria-hidden="true">
            <div class="qring-in">
              <span class="qring-time">${fmtClock(prog.remainingToTargetMs)}</span>
              <span class="qring-unit">restant</span>
            </div>
          </div>
          <div class="aq-main">
            <div class="aq-title"><span class="h-emoji" aria-hidden="true">${d ? d.emoji : '•'}</span>${aq.title}</div>
            <div class="aq-sub">${(d ? d.label : aq.domain)} · ${aq.minutes} min estimées</div>
            <p class="aq-note">Le chrono tourne pour de vrai — même si tu fermes l’app, il reprend où il en était.</p>
          </div>
        </div>
        <div class="aq-foot">
          ${prog.gateReached
            ? html`<button class="btn gold aq-finish" type="button" onClick=${finishActiveQuest}>J’ai fini</button>`
            : html`
              <div class="aq-gate">
                <button class="btn aq-finish" type="button" disabled>J’ai fini</button>
                <span class="aq-gatehint">Encore ~${gateMin} min avant de pouvoir valider — rien ne presse.</span>
              </div>`}
          ${ui.quest.confirmAbandon
            ? null
            : html`<button class="lnk aq-abandon" type="button" onClick=${askAbandon}>Arrêter</button>`}
        </div>
        ${ui.quest.confirmAbandon
          ? html`
            <div class="del-confirm" role="group" aria-label="Confirmer l’arrêt de la quête">
              <span class="msg">Arrêter cette quête ? Rien n’est perdu, tu pourras la relancer.</span>
              <button class="btn ghost" type="button" onClick=${confirmAbandon}>Oui, arrêter</button>
              <button class="btn" type="button" onClick=${cancelAbandon}>Continuer</button>
            </div>`
          : null}
      </div>`;
  }

  // Une ligne du catalogue curé : titre + durée + « pourquoi » + démarrer.
  function QuestRow(q) {
    return html`
      <li class="quest-row">
        <div class="qr-main">
          <div class="qr-title">${q.title}<span class="qr-min">${q.minutes} min</span></div>
          <div class="qr-why">${q.why}</div>
        </div>
        <button class="btn qr-start" type="button" aria-label=${'Démarrer : ' + q.title + ', ' + q.minutes + ' minutes'}
                onClick=${function () { startCatalogueQuest(q); }}>Démarrer</button>
      </li>`;
  }

  // Le lanceur de quêtes (visible quand AUCUNE quête ne tourne) : catalogue filtré par domaine
  // + création d'une quête perso (récompense JAMAIS saisie — dérivée de la durée à la fin).
  function QuestLauncher() {
    var list = quests.byDomain(ui.quest.domain);
    var p = ui.quest.perso;
    return html`
      <div class="quest-launcher">
        <span class="lab2" style="margin-top:0">Choisis un domaine</span>
        ${DomainChips(ui.quest.domain, function (id) { ui.quest.domain = id; paint(); })}
        <ul class="quest-list">${list.map(QuestRow)}</ul>

        <div class="perso-quest">
          <div class="pq-head">Ou lance la tienne</div>
          <input class="in" type="text" value=${p.title} placeholder="Ex. Ranger le bureau"
                 aria-label="Titre de ta quête" autocomplete="off"
                 onInput=${function (e) { ui.quest.perso.title = e.target.value; paint(); }} />
          <span class="lab2">Domaine</span>
          ${DomainChips(p.domain, function (id) { ui.quest.perso.domain = id; paint(); })}
          <span class="lab2">Durée</span>
          <div class="dur-select" role="group" aria-label="Durée en minutes">
            ${DURATION_PRESETS.map(function (m) {
              var on = m === p.minutes;
              return html`
                <button type="button" class="dur-chip" aria-pressed=${on ? 'true' : 'false'}
                        onClick=${function () { ui.quest.perso.minutes = m; paint(); }}>${m} min</button>`;
            })}
          </div>
          <p class="pq-note">Ta récompense dépendra de la durée — elle se révélera à la fin, jamais avant.</p>
          <button class="btn" type="button" disabled=${!p.title.trim()}
                  onClick=${startPersoQuest}>Démarrer cette quête</button>
        </div>
      </div>`;
  }

  // Section Quêtes : soit la quête en cours (un seul chrono), soit le lanceur. Un bandeau doux
  // guide vers la pile « À découvrir » juste après un accomplissement.
  function QuestSection() {
    var aq = store.get().activeQuest;
    var active = derive.isValidActiveQuest(aq);
    return html`
      <section class="section quest-section" aria-label="Quêtes minutées">
        <h2 class="sec-title">Quêtes minutées</h2>
        <p class="sec-note">Une action, un chrono honnête. À la moitié du temps, tu peux valider —
        et tu reçois un coffre à la hauteur de l’effort.</p>
        ${ui.quest.done
          ? html`
            <div class="quest-done" role="status">
              <span>Quête accomplie 🎉 — ton <strong>${ui.quest.done.label}</strong> t’attend plus bas, dans « À découvrir ».</span>
              <button class="lnk" type="button" onClick=${function () { ui.quest.done = null; paint(); }}>OK</button>
            </div>`
          : null}
        ${active ? ActiveQuestCard(aq) : QuestLauncher()}
      </section>`;
  }

  // Écran M1 (habitudes / quêtes / coffres / collection) — inchangé, désormais un onglet.
  function HabitScreen() {
    var habits = (store.get().habits || []).filter(function (hb) { return hb && hb.id; });
    return html`
      <main class="wrap">
        <header class="app-hero">
          <div class="eyebrow">ASCEND · v${VER}</div>
          <h1>Tes habitudes</h1>
          <p class="lede">Chaque fois que tu la fais pour de vrai, valide-la ici.
          Rien ne se perd, rien ne se punit — ton île avance avec toi.</p>
        </header>

        ${Creator()}

        <section class="section" aria-label="Tes habitudes">
          ${LevelBanner()}
          ${MilestoneBanner()}
          ${habits.length
            ? html`<div class="habits">${habits.map(HabitCard)}</div>`
            : EmptyState()}
        </section>

        ${QuestSection()}
        ${ChestPile()}
      </main>`;
  }

  // Barre d'onglets (bas) : bascule Île ↔ Habitudes. Fixe, sûre pour l'encoche (safe-area).
  function TabBar() {
    var tabs = [
      { id: 'ile', label: 'Île', emoji: '🏝️' },
      { id: 'habitudes', label: 'Habitudes', emoji: '🌱' }
    ];
    return html`
      <nav class="tabbar" role="tablist" aria-label="Navigation principale">
        ${tabs.map(function (t) {
          var on = ui.tab === t.id;
          return html`
            <button type="button" class="tab ${on ? 'on' : ''}" role="tab"
                    aria-selected=${on ? 'true' : 'false'}
                    onClick=${function () { if (ui.tab !== t.id) { ui.tab = t.id; paint(); } }}>
              <span class="tab-emoji" aria-hidden="true">${t.emoji}</span>
              <span class="tab-label">${t.label}</span>
            </button>`;
        })}
      </nav>`;
  }

  function App() {
    var onIsland = ui.tab === 'ile';
    return html`
      <div class="sky" aria-hidden="true"></div>
      ${onIsland
        ? island.Screen({
            view: ui.islandView, ver: VER,
            onView: function (v) { if (ui.islandView !== v) { ui.islandView = v; paint(); } },
            repaint: paint      // Phase 2.3 : re-rendu pour l'UI de placement éphémère (sélection, glisser)
          })
        : HabitScreen()}
      ${TabBar()}
      ${Ceremony()}`;
  }

  /* ------------------------------------------------------------------- montage */
  var mount = document.getElementById('app');
  function paint() { render(h(App), mount); syncQuestTick(); }
  store.subscribe(function () { paint(); });
  paint();
  var splash = document.getElementById('splash');
  if (splash) splash.classList.add('hidden');
})();

</script>
</body>
</html>
