<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ASCEND">
<meta name="theme-color" content="#10131F">
<title>ASCEND</title>
<style>
/* ASCEND v2 — Design system (Phase 0.3, étendu Phase 1.1).
   Direction : AMBIANCE PILOTÉE PAR L'HEURE (choix de Leo).
   L'app s'ouvre sur l'île ; le ciel/fond évolue avec la journée —
   « jour doux » en journée, « nuit étoilée » après 21 h, « aube pastel »
   au lever/coucher. Trois JEUX DE TOKENS pour les MÊMES variables
   sémantiques, commutés par [data-ambiance] (moteur : app/ui/ambiance.js).

   Règle d'accessibilité (calibrée AA contre le fond RENDU) :
   - le TEXTE n'utilise que --ink (≥ 12:1) et --ink-2 (≥ 5:1) sur --bg/--surface ;
   - --accent et --gold sont des REMPLISSAGES / bordures / icônes ; quand du texte
     s'y pose, il prend --on-accent / --on-gold (dark, tous ≥ 5:1) ;
   - plancher typographique 11 px ; cibles tactiles ≥ 44 px ;
   - prefers-reduced-motion : coupe transitions d'ambiance et animations. */

/* --- Couleurs de ciel animables : typées <color> pour un fondu réel entre
       ambiances (interpolation de dégradé impossible sans @property). --- */
@property --sky-top    { syntax: '<color>'; inherits: true; initial-value: #BFE3EC; }
@property --sky-mid    { syntax: '<color>'; inherits: true; initial-value: #DCEFF0; }
@property --sky-bottom { syntax: '<color>'; inherits: true; initial-value: #F0F4F5; }

/* ============================ TOKENS ============================ */
:root {
  /* Échelles non thématiques */
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
               'Helvetica Neue', Arial, sans-serif;
  --r-sm: 10px; --r-md: 14px; --r-lg: 20px; --r-pill: 999px;
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 24px; --sp-6: 32px;
  --dur-amb: 1200ms;                 /* fondu du ciel entre ambiances */
  --dur-ui: 160ms;

  /* --- JOUR DOUX (défaut) --- */
  --bg: #F0F4F5;
  --surface: #FFFFFF;
  --surface-2: #F7FAFB;
  --ink: #1E2A2E;                    /* 13.3:1 / bg · 14.7:1 / surface */
  --ink-2: #5A6A70;                  /* 5.0:1 / bg */
  --line: rgba(30, 42, 46, .12);
  --accent: #3DA9A0;                 /* remplissage */
  --on-accent: #0E211F;              /* 5.9:1 sur --accent */
  --accent-soft: rgba(61, 169, 160, .14);
  --gold: #C9A24B;
  --on-gold: #2A2410;                /* 6.1:1 sur --gold */
  --gold-soft: rgba(201, 162, 75, .16);
  --shadow: rgba(30, 42, 46, .10);
  --sky-top: #BFE3EC; --sky-mid: #DCEFF0; --sky-bottom: #F0F4F5;
  --star: transparent;              /* pas d'étoiles en journée */
  /* --- Scène île (décoratif ; harmonisé à l'ambiance horaire) --- */
  --sea-1: #86CBDA; --sea-2: #4FA3BE;
  --land: #C3E4A6; --land-2: #8CC474; --shore: #ECDDA8;
  --ruin: #CDC3AC; --ruin-2: #A79B80; --plot: #B7CFA0; --plot-2: #A9C692;
  --fog: #EAF1F3;
}

[data-ambiance="crepuscule"] {
  /* --- AUBE PASTEL (lever / coucher) --- */
  --bg: #FBF3EC;
  --surface: #FFF8F1;
  --surface-2: #FDEFE4;
  --ink: #2E2A33;                    /* 12.9:1 / bg */
  --ink-2: #6B6472;                  /* 5.1:1 / bg */
  --line: rgba(46, 42, 51, .12);
  --accent: #E8927C;
  --on-accent: #2E2028;              /* 5.9:1 sur --accent */
  --accent-soft: rgba(232, 146, 124, .16);
  --gold: #C99A3E;
  --on-gold: #2A2410;               /* 5.5:1 sur --gold */
  --gold-soft: rgba(201, 154, 62, .16);
  --shadow: rgba(74, 52, 40, .12);
  --sky-top: #F3B9A0; --sky-mid: #F7D3C0; --sky-bottom: #FBF3EC;
  --star: transparent;
  --sea-1: #EBA98C; --sea-2: #CE8285;
  --land: #E7C89C; --land-2: #CBA075; --shore: #F3DBB4;
  --ruin: #CDB69E; --ruin-2: #A98D75; --plot: #DDBE94; --plot-2: #CFAF83;
  --fog: #FBF0E6;
}

[data-ambiance="nuit"] {
  /* --- NUIT ÉTOILÉE (après 21 h) --- */
  --bg: #0E1220;
  --surface: #1A2036;
  --surface-2: #222A44;
  --ink: #EEF1FA;                    /* 16.4:1 / bg */
  --ink-2: #A6AEC6;                  /* 8.4:1 / bg */
  --line: rgba(255, 255, 255, .10);
  --accent: #6EA8FF;
  --on-accent: #0A1020;             /* 7.9:1 sur --accent */
  --accent-soft: rgba(110, 168, 255, .16);
  --gold: #E8C06A;
  --on-gold: #241C08;               /* 10.6:1 sur --gold */
  --gold-soft: rgba(232, 192, 106, .16);
  --shadow: rgba(0, 0, 0, .45);
  --sky-top: #0A0E1C; --sky-mid: #12182B; --sky-bottom: #0E1220;
  --star: rgba(255, 255, 255, .85);
  --sea-1: #1C2A4E; --sea-2: #0C1428;
  --land: #34425F; --land-2: #283452; --shore: #46567E;
  --ruin: #566489; --ruin-2: #6E7BA1; --plot: #3B4A69; --plot-2: #45557A;
  --fog: #0E1424;
}

/* ============================ BASE ============================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-text-size-adjust: 100%;
  -webkit-font-smoothing: antialiased;
  transition: background-color var(--dur-amb) ease, color var(--dur-amb) ease;
}

/* --- Ciel d'ambiance : couche fixe plein écran, se fond entre thèmes --- */
.sky {
  position: fixed; inset: 0; z-index: -2;
  background: linear-gradient(180deg,
    var(--sky-top) 0%, var(--sky-mid) 48%, var(--sky-bottom) 100%);
  transition: --sky-top var(--dur-amb) ease,
              --sky-mid var(--dur-amb) ease,
              --sky-bottom var(--dur-amb) ease;
}
/* Champ d'étoiles (nuit uniquement — décoratif, pas de contrainte de contraste) */
.sky::after {
  content: ""; position: absolute; inset: 0; z-index: -1;
  background-image:
    radial-gradient(1px 1px at 12% 18%, var(--star), transparent),
    radial-gradient(1px 1px at 28% 42%, var(--star), transparent),
    radial-gradient(1.4px 1.4px at 46% 12%, var(--star), transparent),
    radial-gradient(1px 1px at 63% 34%, var(--star), transparent),
    radial-gradient(1.2px 1.2px at 78% 20%, var(--star), transparent),
    radial-gradient(1px 1px at 88% 46%, var(--star), transparent),
    radial-gradient(1px 1px at 8% 60%, var(--star), transparent),
    radial-gradient(1.3px 1.3px at 34% 68%, var(--star), transparent),
    radial-gradient(1px 1px at 70% 62%, var(--star), transparent);
  transition: opacity var(--dur-amb) ease;
}

/* Splash (repris de la Phase 0.1/0.2) */
#splash {
  position: fixed; inset: 0; z-index: 90;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  transition: opacity .25s ease;
}
#splash.hidden { opacity: 0; pointer-events: none; }
#app { min-height: 100%; }

/* ==================== PREMIER ÉCRAN — HABITUDES (Phase 1.1) ==================== */
.wrap {
  max-width: 560px; margin: 0 auto;
  padding: max(24px, env(safe-area-inset-top)) 20px calc(48px + env(safe-area-inset-bottom));
}
.eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: .16em;
  text-transform: uppercase; color: var(--ink-2);
}

/* Hero */
.app-hero { padding: 8px 0 20px; }
.app-hero h1 {
  font-size: clamp(26px, 7vw, 34px); font-weight: 700;
  letter-spacing: .01em; line-height: 1.1; margin: 6px 0 8px;
}
.lede { color: var(--ink-2); font-size: 15px; max-width: 46ch; }

/* Libellés & champs génériques */
.lab, .lab2 {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--ink-2); margin: 0 0 6px;
}
.lab2 { margin: 16px 0 8px; }
.in {
  width: 100%; min-height: 48px; padding: 0 14px;
  background: var(--surface); color: var(--ink);
  border: 1px solid var(--line); border-radius: var(--r-md);
  font: inherit; font-size: 15px;
  transition: border-color var(--dur-ui) ease, box-shadow var(--dur-ui) ease;
}
.in::placeholder { color: var(--ink-2); opacity: .75; }
.in:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

/* Boutons (système) */
.btn {
  min-height: 48px; padding: 0 22px; border: 0; border-radius: var(--r-pill);
  background: var(--accent); color: var(--on-accent);
  font: inherit; font-size: 15px; font-weight: 700; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform var(--dur-ui) ease, filter var(--dur-ui) ease;
}
.btn:active { transform: scale(.97); }
.btn:hover { filter: brightness(1.04); }
.btn[disabled] { opacity: .45; cursor: default; filter: none; transform: none; }
.btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
.btn.ghost:hover { border-color: var(--accent); filter: none; }
/* Bouton doré — l'action « récompense » (ouvrir un coffre, rejoindre la collection).
   Réintroduit en Phase 1.3, là où il SERT enfin (gardé hors de 1.2 → zéro code mort). */
.btn.gold { background: var(--gold); color: var(--on-gold); }

/* Formulaire de création */
.creator {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 18px;
  box-shadow: 0 6px 20px -12px var(--shadow);
  display: flex; flex-direction: column;
}
.creator .in + .in { margin-top: 12px; }
.creator .btn { margin-top: 18px; }

/* Sélecteur de domaine (chips, single-select) */
.dom-select { display: flex; flex-wrap: wrap; gap: 8px; }
.dom-chip {
  min-height: 44px; padding: 0 14px;
  display: inline-flex; align-items: center; gap: 7px;
  border: 1px solid var(--line); border-radius: var(--r-pill);
  background: var(--surface); color: var(--ink);
  font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background-color var(--dur-ui) ease, border-color var(--dur-ui) ease,
              transform var(--dur-ui) ease;
}
.dom-chip:hover { border-color: var(--accent); }
.dom-chip:active { transform: scale(.97); }
.dom-chip[aria-pressed="true"] { background: var(--accent-soft); border-color: var(--accent); }
.dom-chip .d-emoji { font-size: 15px; }

/* Liste des habitudes */
.section { margin-top: 26px; }
.habits { display: flex; flex-direction: column; gap: 12px; }
.habit {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 16px;
  box-shadow: 0 6px 20px -12px var(--shadow);
}
.habit-head { display: flex; align-items: flex-start; gap: 12px; }
.habit .h-emoji { font-size: 22px; line-height: 1.25; flex: 0 0 auto; }
.habit .h-main { flex: 1; min-width: 0; }
.habit .h-title { font-weight: 700; font-size: 16px; word-break: break-word; }
.habit .h-sub { color: var(--ink-2); font-size: 13px; margin-top: 2px; }
.habit .h-count {
  flex: 0 0 auto; font-weight: 700; font-size: 20px; color: var(--ink);
  line-height: 1; font-variant-numeric: tabular-nums;
  display: inline-flex; align-items: baseline; gap: 4px; white-space: nowrap;
}
.habit .h-count .u { font-size: 11px; font-weight: 600; color: var(--ink-2); }

/* Indice « prochain jalon » (Phase 1.5) — INVITATION, jamais menace : discret, doré, non
   punitif. Apparaît une fois l'habitude entamée (≥ 1 validation) et disparaît au-delà du 100ᵉ. */
.habit .h-goal {
  display: flex; align-items: center; gap: 7px;
  margin-top: 10px; font-size: 12px; color: var(--ink-2);
}
.habit .h-goal .hg-ico { font-size: 13px; line-height: 1; }
.habit .h-goal strong { color: var(--ink); font-variant-numeric: tabular-nums; }

/* Bandeau doux après un JALON franchi (Phase 1.5) — même grammaire que « quête accomplie ». */
.milestone-done {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  background: var(--gold-soft); border: 1px solid var(--gold);
  border-radius: var(--r-md); padding: 12px 14px; margin-bottom: 14px;
  font-size: 14px; color: var(--ink);
}
.milestone-done .lnk { margin-left: auto; }

.habit-foot {
  display: flex; align-items: center; gap: 10px;
  margin-top: 14px; flex-wrap: wrap;
}
.habit .btn.val { flex: 1; min-width: 150px; }
.habit .done {
  flex: 1; min-width: 150px; min-height: 48px;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  border-radius: var(--r-pill); font-weight: 700; font-size: 15px;
  background: var(--accent-soft); color: var(--ink); border: 1px solid var(--accent);
}
.h-actions { display: flex; gap: 2px; margin-left: auto; }
.lnk {
  min-height: 44px; padding: 0 10px; background: transparent; border: 0;
  color: var(--ink-2); font: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; border-radius: var(--r-sm);
}
.lnk:hover { color: var(--ink); }

/* Édition inline */
.habit.editing .edit-actions { display: flex; gap: 10px; margin-top: 18px; }
.habit.editing .edit-actions .btn { flex: 1; }

/* Confirmation de suppression */
.del-confirm {
  margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.del-confirm .msg { flex: 1; min-width: 160px; font-size: 14px; color: var(--ink); }
.del-confirm .btn { min-height: 44px; padding: 0 16px; font-size: 14px; flex: 0 0 auto; }

/* État vide (île qui s'éveille) */
.empty {
  text-align: center; padding: 40px 24px; color: var(--ink-2);
  border: 1px dashed var(--line); border-radius: var(--r-lg);
}
.empty .e-emoji { font-size: 34px; }
.empty .e-title { color: var(--ink); font-weight: 700; font-size: 17px; margin: 10px 0 6px; }
.empty p { font-size: 14px; max-width: 36ch; margin: 0 auto; }

/* ==================== COFFRES — À DÉCOUVRIR (Phase 1.2) ==================== */
.chest-section { margin-top: 26px; }
.sec-title { font-size: 18px; font-weight: 700; letter-spacing: .01em; }
.sec-note { color: var(--ink-2); font-size: 13px; margin: 4px 0 14px; max-width: 46ch; }

.chest-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.chest {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 14px 16px;
  box-shadow: 0 6px 20px -12px var(--shadow);
}
.chest-main { flex: 1; min-width: 0; }
.chest-open { flex: 0 0 auto; min-height: 44px; padding: 0 18px; font-size: 14px; }
.chest-title { font-weight: 700; font-size: 15px; }
.chest-src { color: var(--ink-2); font-size: 13px; margin-top: 2px; word-break: break-word; }

/* Vignette de coffre — placeholder géométrique propre (décoratif, aria-hidden ; les SVG
   Claude Design la remplaceront, jamais redessinés — CLAUDE.md). Géométrie PARTAGÉE,
   palette PAR TYPE : en 1.2 seul le bois est produit, donc seule sa palette est définie
   (les autres arrivent avec leur phase — zéro palette orpheline). */
.chest-vig {
  position: relative; flex: 0 0 auto; width: 46px; height: 40px;
  border-radius: 7px;
  background: var(--chest-body); border: 1px solid var(--chest-edge);
  box-shadow: inset 0 -7px 10px -6px rgba(0, 0, 0, .28);
}
.chest-vig::before {                       /* couvercle */
  content: ""; position: absolute; left: -1px; right: -1px; top: -1px; height: 15px;
  border-radius: 7px 7px 3px 3px;
  background: var(--chest-lid); border: 1px solid var(--chest-edge);
}
.chest-vig::after {                         /* fermoir doré */
  content: ""; position: absolute; left: 50%; top: 10px;
  width: 8px; height: 13px; transform: translateX(-50%);
  border-radius: 2px; background: var(--gold); border: 1px solid var(--on-gold);
}
/* Palette PAR MATÉRIAU = niveau de rareté (arbitrage Leo, Phase 1.4). Phase 1.5 : les jalons
   d'habitude produisent aussi CRISTAL (légendaire, 50ᵉ) et AUBE (unique, 100ᵉ) → ils gagnent
   leur palette ici (obsidienne reste déclarée sans source → sans palette : zéro palette orpheline). */
.chest-vig--bois    { --chest-body: #A9743F; --chest-lid: #BC854B; --chest-edge: #6F4A28; }
.chest-vig--fer     { --chest-body: #8B939E; --chest-lid: #A7AFBA; --chest-edge: #565C66; }
.chest-vig--or      { --chest-body: #C79A3C; --chest-lid: #E0BB60; --chest-edge: #8A6A22; }
.chest-vig--cristal { --chest-body: #7E6FD6; --chest-lid: #9E90EC; --chest-edge: #52439E; } /* violet gemme */
.chest-vig--aube    { --chest-body: #E58AA6; --chest-lid: #F4B7C8; --chest-edge: #BC5C79; } /* rose d'aube */

/* ==================== MENU DU DOMAINE / COLLECTION (Phase 3.1) ==================== */
/* Cap « l'île = lobby » : taper un bâtiment ouvre le hub de son domaine. En 3.1 = état du
   bâtiment + sa collection (obtenues/manquantes X/Y + détail-souvenir). Dialog focus-trappé,
   au-dessus de la scène et des onglets (la cérémonie 1.3, z-80, reste au-dessus). */
.dom-menu { position: fixed; inset: 0; z-index: 60; display: flex; }
.dm-backdrop { position: absolute; inset: 0; background: rgba(10, 14, 22, .5); animation: dm-fade var(--dur-ui) ease; }
.dm-panel {
  position: relative; margin: auto; width: min(560px, 100%); max-height: 100%;
  display: flex; flex-direction: column; outline: none;
  background: var(--bg); border: 1px solid var(--line);
  border-radius: var(--r-lg); box-shadow: 0 24px 64px -20px var(--shadow);
  animation: dm-pop var(--dur-ui) ease;
}
@media (min-width: 480px) { .dm-panel { max-height: 88%; } }
.dm-head {
  display: flex; align-items: center; gap: 12px; flex: 0 0 auto;
  padding: 16px 16px 12px; border-bottom: 1px solid var(--line);
}
.dm-emoji { font-size: 30px; line-height: 1; flex: 0 0 auto; }
.dm-headmain { flex: 1 1 auto; min-width: 0; }
.dm-title { font-size: 20px; font-weight: 800; color: var(--ink); }
.dm-state { font-size: 12px; color: var(--ink-2); margin-top: 2px; }
.dm-close {
  flex: 0 0 auto; width: 44px; height: 44px; border-radius: var(--r-pill);
  background: var(--surface); border: 1px solid var(--line); color: var(--ink);
  font: inherit; font-size: 16px; cursor: pointer;
}
.dm-close:hover { border-color: var(--accent); }
.dm-body { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; }
.dm-collhead { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
.dm-h { font-size: 13px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-2); }
.dm-h-extra { margin-top: 22px; }
.dm-count { font-size: 15px; font-weight: 800; color: var(--ink); font-variant-numeric: tabular-nums; }
.dm-note { font-size: 12px; color: var(--ink-2); margin: 6px 0 14px; }
.dm-grid { list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 10px; }
.dm-card {
  display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center;
  width: 100%; min-height: 112px; padding: 12px 8px;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md);
}
button.dm-card { cursor: pointer; font: inherit; color: var(--ink); }
button.dm-card:hover { border-color: var(--accent); }
button.dm-card:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.dm-card.got { border-color: var(--accent-soft); }
.dm-card.locked { opacity: .72; border-style: dashed; }
.dmc-emoji { font-size: 30px; line-height: 1; }
.dm-card.locked .dmc-emoji { color: var(--ink-2); opacity: .5; }
.dmc-name { font-size: 12px; font-weight: 700; color: var(--ink); line-height: 1.25; word-break: break-word; }
.dm-card.locked .dmc-name { color: var(--ink-2); font-weight: 600; }
.rc-rarity.dim { opacity: .5; }

/* Détail-souvenir d'un objet (dans le menu) — histoire (placeholder v0, 6.1) + métadonnées. */
.dm-back {
  min-height: 44px; padding: 0 16px; border-radius: var(--r-pill); margin-bottom: 14px;
  background: var(--surface); border: 1px solid var(--line); color: var(--ink);
  font: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
}
.dm-back:hover { border-color: var(--accent); }
.dm-detail-card {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  padding: 22px 16px; background: var(--surface); border: 1px solid var(--gold);
  border-radius: var(--r-lg); box-shadow: 0 12px 32px -16px var(--shadow);
}
.dmd-emoji { font-size: 52px; line-height: 1; }
.dmd-name { font-size: 18px; font-weight: 800; color: var(--ink); text-align: center; word-break: break-word; }
.dm-detail-info { margin-top: 16px; }
.dmd-h { font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-2); margin-top: 14px; }
.dmd-h:first-child { margin-top: 0; }
.dmd-story { font-size: 14px; color: var(--ink); margin-top: 6px; }
.dmd-meta { font-size: 13px; color: var(--ink-2); margin-top: 6px; font-variant-numeric: tabular-nums; }
.dmd-src { font-size: 13px; color: var(--ink-2); margin-top: 4px; word-break: break-word; }

@keyframes dm-fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes dm-pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ==================== CÉRÉMONIE D'OUVERTURE (Phase 1.3) ==================== */
/* < 6 s, skippable (tap/« Passer »), INSTANTANÉE en reduce-motion. Voile sombre fixe pour
   concentrer l'attention (texte en encre claire fixe → lisible quelle que soit l'ambiance). */
.ceremony {
  position: fixed; inset: 0; z-index: 80;
  display: flex; align-items: center; justify-content: center;
  padding: 24px; background: rgba(10, 14, 22, .74);
  animation: cer-fade var(--dur-ui) ease;
}
.cer-stage { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 16px; }
.cer-hint { color: #EEF1FA; font-size: 14px; display: flex; align-items: center; gap: 10px; }
.cer-skip {
  min-height: 44px; padding: 0 12px; background: transparent;
  border: 1px solid rgba(255, 255, 255, .35); border-radius: var(--r-pill);
  color: #EEF1FA; font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
}
.cer-skip:hover { border-color: #EEF1FA; }

/* Suspense : le coffre grandi tremble doucement + halo doré (animation coupée par
   reduce-motion via la règle globale ; on affiche alors directement la révélation). */
.cer-chest {
  transform: scale(2.3);
  animation: cer-tremble .55s ease-in-out infinite;
  filter: drop-shadow(0 0 14px var(--gold));
}

/* Révélation */
.cer-reveal { animation: cer-pop .32s ease; }
.cer-kicker {
  color: #EEF1FA; font-size: 13px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
}
.cer-src { color: #C9D0E0; font-size: 13px; max-width: 40ch; }
.cer-reveal .btn.gold { margin-top: 4px; }

/* Carte-récompense (placeholder géométrique ; SVG Claude Design plus tard) */
.reward-card {
  display: inline-flex; flex-direction: column; align-items: center; gap: 12px;
  width: 210px; padding: 26px 20px;
  background: var(--surface); border: 1px solid var(--gold);
  border-radius: var(--r-lg); box-shadow: 0 16px 48px -14px rgba(0, 0, 0, .5);
}
.rc-emoji { font-size: 48px; line-height: 1; }
.rc-name { font-weight: 700; font-size: 18px; color: var(--ink); text-align: center; word-break: break-word; }
.rc-rarity {
  font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  padding: 3px 12px; border-radius: var(--r-pill);
}
/* Chips : commun·rare·épique (quêtes 1.4) + légendaire·unique (cartes-jalons 1.5, cristal/aube).
   Les trois premiers suivent les tokens d'ambiance ; les deux jalons portent des teintes gemme
   FIXES (texte blanc AA sur leur propre fond → lisibles quelle que soit l'ambiance). Obsidienne/
   exceptionnel reste sans source → sans chip (zéro palette orpheline). */
.rc-rarity--commun     { background: var(--accent-soft); color: var(--ink);       border: 1px solid var(--accent); }
.rc-rarity--rare       { background: var(--accent);      color: var(--on-accent); border: 1px solid var(--accent); }
.rc-rarity--epique     { background: var(--gold);        color: var(--on-gold);   border: 1px solid var(--gold); }
.rc-rarity--legendaire { background: #6D28D9;            color: #FFFFFF;          border: 1px solid #6D28D9; } /* violet 6.4:1 */
.rc-rarity--unique     { background: #BE185D;            color: #FFFFFF;          border: 1px solid #BE185D; } /* rose 6.1:1 */

@keyframes cer-fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes cer-pop { from { transform: scale(.86); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes cer-tremble {
  0%, 100% { transform: scale(2.3) translateX(0) rotate(0); }
  25%      { transform: scale(2.3) translateX(-2px) rotate(-2.2deg); }
  75%      { transform: scale(2.3) translateX(2px) rotate(2.2deg); }
}

/* ==================== QUÊTES MINUTÉES (Phase 1.4) ==================== */
.quest-section { margin-top: 26px; }

/* Bandeau doux après un accomplissement (guide vers la pile, jamais culpabilisant) */
.quest-done {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  background: var(--gold-soft); border: 1px solid var(--gold);
  border-radius: var(--r-md); padding: 12px 14px; margin-bottom: 14px;
  font-size: 14px; color: var(--ink);
}
.quest-done .lnk { margin-left: auto; }

/* --- Lanceur : catalogue + quête perso --- */
.quest-launcher { display: flex; flex-direction: column; }
.quest-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
.quest-row {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 14px 16px;
  box-shadow: 0 6px 20px -12px var(--shadow);
}
.qr-main { flex: 1; min-width: 0; }
.qr-title { font-weight: 700; font-size: 15px; display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.qr-min {
  font-size: 12px; font-weight: 700; color: var(--ink-2);
  font-variant-numeric: tabular-nums;
  background: var(--surface-2); border: 1px solid var(--line);
  border-radius: var(--r-pill); padding: 2px 9px;
}
.qr-why { color: var(--ink-2); font-size: 13px; margin-top: 3px; word-break: break-word; }
.qr-start { flex: 0 0 auto; min-height: 44px; padding: 0 18px; font-size: 14px; }

/* Quête perso */
.perso-quest {
  margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--line);
  display: flex; flex-direction: column;
}
.pq-head { font-weight: 700; font-size: 15px; margin-bottom: 10px; }
.perso-quest .in { margin-bottom: 4px; }
.pq-note { color: var(--ink-2); font-size: 13px; margin: 12px 0 14px; max-width: 46ch; }

.dur-select { display: flex; flex-wrap: wrap; gap: 8px; }
.dur-chip {
  min-height: 44px; padding: 0 14px;
  border: 1px solid var(--line); border-radius: var(--r-pill);
  background: var(--surface); color: var(--ink);
  font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  font-variant-numeric: tabular-nums;
  transition: background-color var(--dur-ui) ease, border-color var(--dur-ui) ease, transform var(--dur-ui) ease;
}
.dur-chip:hover { border-color: var(--accent); }
.dur-chip:active { transform: scale(.97); }
.dur-chip[aria-pressed="true"] { background: var(--accent-soft); border-color: var(--accent); }

/* --- Quête en cours : anneau + compte à rebours --- */
.active-quest {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 18px;
  box-shadow: 0 6px 20px -12px var(--shadow);
}
.aq-head { display: flex; align-items: center; gap: 18px; }

/* Anneau de progression : conic-gradient piloté en inline-style (progress → deg), disque
   intérieur en --surface pour le rebours. Passe au doré à 50 % (classe .ready). Aucune
   animation continue (reduce-motion-safe ; il ne fait que se re-peindre chaque seconde). */
.qring {
  flex: 0 0 auto; width: 104px; height: 104px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.qring-in {
  width: 82px; height: 82px; border-radius: 50%;
  background: var(--surface);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  box-shadow: inset 0 0 0 1px var(--line);
}
.qring-time { font-size: 22px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; line-height: 1; }
.qring-unit { font-size: 11px; font-weight: 600; color: var(--ink-2); margin-top: 3px; }
.qring.ready .qring-time { color: var(--ink); }

.aq-main { flex: 1; min-width: 0; }
.aq-title { font-weight: 700; font-size: 17px; display: flex; align-items: center; gap: 8px; word-break: break-word; }
.aq-title .h-emoji { font-size: 20px; }
.aq-sub { color: var(--ink-2); font-size: 13px; margin-top: 2px; font-variant-numeric: tabular-nums; }
.aq-note { color: var(--ink-2); font-size: 12px; margin-top: 8px; max-width: 40ch; }

.aq-foot { display: flex; align-items: center; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
.aq-gate { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 6px; }
.aq-finish { min-width: 150px; }
.aq-gate .aq-finish { width: 100%; }
.aq-gatehint { font-size: 12px; color: var(--ink-2); }
.aq-abandon { margin-left: auto; }

/* ==================== NAVIGATION PAR ONGLETS (Phase 2.1) ==================== */
:root { --nav-h: 60px; }

/* La page habitudes doit dégager la barre d'onglets fixe. */
.wrap { padding-bottom: calc(var(--nav-h) + 28px + env(safe-area-inset-bottom)); }

.tabbar {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
  display: flex; gap: 4px;
  padding: 6px 10px calc(6px + env(safe-area-inset-bottom));
  background: color-mix(in srgb, var(--surface) 86%, transparent);
  border-top: 1px solid var(--line);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.tab {
  flex: 1; min-height: 52px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  border: 0; border-radius: var(--r-md); background: transparent; cursor: pointer;
  color: var(--ink-2); font: inherit;
  transition: color var(--dur-ui) ease, background-color var(--dur-ui) ease;
}
.tab:hover { background: var(--surface-2); }
.tab .tab-emoji { font-size: 21px; line-height: 1; }
.tab .tab-label { font-size: 11px; font-weight: 700; letter-spacing: .02em; }
.tab.on { color: var(--ink); }
.tab.on { background: var(--accent-soft); }
.tab.on .tab-label { color: var(--ink); }

/* ==================== ÉCRAN ÎLE — SCÈNE v1 (Phase 2.1) ==================== */
.island-screen {
  position: relative;
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column; overflow: hidden;
}
.island-top {
  flex: 0 0 auto;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: max(14px, env(safe-area-inset-top)) 18px 12px;
}
.island-top .eyebrow { min-width: 0; }

/* Segmenteur Scène / Liste */
.seg {
  flex: 0 0 auto; display: inline-flex; padding: 3px;
  background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-pill);
}
.seg-btn {
  min-height: 38px; padding: 0 16px; border: 0; border-radius: var(--r-pill);
  background: transparent; color: var(--ink-2); font: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: background-color var(--dur-ui) ease, color var(--dur-ui) ease;
}
.seg-btn[aria-pressed="true"] { background: var(--surface); color: var(--ink); box-shadow: 0 1px 4px -2px var(--shadow); }

/* Scène : SVG plein cadre, pilotée au doigt (pan/zoom) */
.isl-stage { position: relative; flex: 1 1 auto; overflow: hidden; }
.isl-svg {
  position: absolute; inset: 0; width: 100%; height: 100%; display: block;
  touch-action: none;                 /* on gère TOUS les gestes (leçon v1) */
  cursor: grab; -webkit-user-select: none; user-select: none;
}
.isl-svg:active { cursor: grabbing; }

/* Calques décoratifs */
.isl-shore { fill: var(--shore); opacity: .9; }
.isl-plot { fill: var(--plot); }
.isl-plot-in { fill: var(--plot-2); }
.isl-ruin { fill: var(--ruin); opacity: .85; }
.isl-parcelle .isl-badge { fill: var(--surface); opacity: .55; }
.isl-parcelle .isl-emoji { font-size: 17px; opacity: .7; }
.isl-parcelle { opacity: .96; }
.isl-deco-pad { fill: var(--plot-2); opacity: .5; }
.isl-emoji { dominant-baseline: middle; }

/* ---- Placement des décorations (Phase 2.3) ---- */
/* Emplacement libre : pastille discrète ; devient une cible qui pulse quand un objet attend. */
.isl-slot .isl-deco-pad { stroke: var(--line); stroke-width: 1.5; stroke-dasharray: 4 5; }
.isl-slot.pulse { cursor: pointer; }
.isl-slot.pulse .isl-deco-pad {
  fill: var(--accent-soft); opacity: .95; stroke: var(--accent); stroke-dasharray: none;
  animation: isl-pulse 1.4s ease-in-out infinite;
}
.isl-slot-plus { fill: var(--accent); font-size: 20px; font-weight: 800; dominant-baseline: middle; }
@keyframes isl-pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }

/* Déco posée : pad + pastille de l'objet (placeholder ; les SVG Claude Design suivront en 2.4). */
.isl-placed { cursor: grab; }
.isl-placed:active { cursor: grabbing; }
.isl-placed .placed-pad { fill: var(--plot-2); opacity: .55; stroke: none; }
.isl-placed .isl-pdot { fill: var(--surface); stroke: var(--line); stroke-width: 1.5; }
.isl-placed.special .isl-pdot { stroke: var(--gold); stroke-width: 2; }
.isl-placed.sel .isl-pdot { stroke: var(--accent); stroke-width: 2.5; }
.isl-placed .isl-pemoji { font-size: 17px; dominant-baseline: middle; }

/* Barre de placement (remplace le hint pendant qu'un objet attend une case). */
.isl-place-bar {
  position: absolute; top: 10px; left: 12px; right: 12px; z-index: 3;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 8px 12px; border-radius: var(--r-pill);
  background: color-mix(in srgb, var(--surface) 92%, transparent);
  border: 1px solid var(--accent); box-shadow: 0 6px 20px -12px var(--shadow);
}
.isl-place-bar .ipb-emoji { font-size: 20px; line-height: 1; flex: 0 0 auto; }
.isl-place-bar .ipb-txt { font-size: 13px; color: var(--ink); min-width: 0; flex: 1 1 140px; }
.isl-place-bar .ipb-btn {
  min-height: 40px; padding: 0 14px; border-radius: var(--r-pill); border: 1px solid var(--accent);
  background: var(--accent-soft); color: var(--ink); font: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
}
.isl-place-bar .ipb-btn.ghost { background: transparent; border-color: var(--line); color: var(--ink-2); }

/* Pioche « À placer » (bas de la scène) : chips horizontales, au-dessus des onglets. */
.isl-tray {
  position: absolute; left: 10px; right: 10px; z-index: 3;
  bottom: calc(var(--nav-h) + 12px + env(safe-area-inset-bottom));
  padding: 8px 10px 10px; border-radius: var(--r-lg);
  background: color-mix(in srgb, var(--surface) 92%, transparent);
  border: 1px solid var(--line); box-shadow: 0 10px 28px -16px var(--shadow);
}
.isl-tray .itray-head { font-size: 11px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-2); margin: 0 2px 6px; }
.isl-tray .itray-scroll { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
.isl-tray .itray-item {
  flex: 0 0 auto; display: flex; align-items: center; gap: 8px; min-height: 44px;
  padding: 6px 12px; border-radius: var(--r-pill); border: 1px solid var(--line);
  background: var(--surface); color: var(--ink); font: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
}
.isl-tray .itray-item.on { border-color: var(--accent); background: var(--accent-soft); }
.isl-tray .itray-item .iti-emoji { font-size: 18px; }
.isl-tray .itray-item .iti-name { white-space: nowrap; max-width: 40vw; overflow: hidden; text-overflow: ellipsis; }

/* Contrôles de placement dans la vue LISTE (sélecteur + bouton). */
.ii-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 12px; margin-top: 8px; }
.isl-place-ctl { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.isl-place-ctl .ipl-lab { font-size: 12px; color: var(--ink-2); }
.isl-select {
  min-height: 44px; padding: 0 12px; border-radius: var(--r-md);
  border: 1px solid var(--line); background: var(--surface); color: var(--ink); font: inherit; font-size: 14px;
}
.isl-place-ctl .ipl-go { min-height: 44px; padding: 0 16px; }
.isl-place-ctl .ipl-none { font-size: 12px; color: var(--ink-2); }
.isl-empty-note { font-size: 13px; color: var(--ink-2); margin: 2px 0 4px; }
.isl-item.placed-item { border-color: var(--accent); }
.isl-item .ii-main { flex: 1 1 auto; }

/* Bâtiment relevé (Phase 2.2) : la ruine qui se relève — tour géométrique + lumière.
   Placeholder ; les assets Claude Design (2.4) prendront le relais sur la même ancre. */
.isl-glow  { fill: var(--gold); }
.isl-tower { fill: var(--ruin-2); stroke: var(--ruin); stroke-width: 1.5; }
.isl-cap   { fill: var(--shore); }
.isl-stem  { fill: var(--ruin); }
.isl-win   { fill: var(--gold); opacity: .92; }
.isl-built .isl-badge { fill: var(--surface); opacity: .95; }
.isl-built .isl-emoji { opacity: 1; }

/* Pastille « X/Y » sous la parcelle (Phase 3.1) : affordance « tappable » + progression de
   collection à même la scène (cap « île = lobby »). Décorative (la vue Liste est le miroir a11y). */
.isl-colltag-bg { fill: var(--surface); opacity: .9; stroke: var(--line); stroke-width: 1; }
.isl-colltag-tx { fill: var(--ink-2); font-size: 11px; font-weight: 700; dominant-baseline: middle; font-variant-numeric: tabular-nums; }

/* Habillages posés sur la scène */
.isl-hint {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  padding: 6px 12px; border-radius: var(--r-pill);
  background: color-mix(in srgb, var(--surface) 82%, transparent);
  border: 1px solid var(--line); color: var(--ink-2); font-size: 12px; font-weight: 600;
  pointer-events: none; white-space: nowrap; max-width: calc(100% - 32px); overflow: hidden; text-overflow: ellipsis;
}
.isl-recenter {
  position: absolute; top: 10px; right: 12px;
  min-height: 40px; padding: 0 14px; border-radius: var(--r-pill);
  background: color-mix(in srgb, var(--surface) 90%, transparent);
  border: 1px solid var(--line); color: var(--ink); font: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 14px -8px var(--shadow);
}
.isl-recenter:hover { border-color: var(--accent); }
.isl-wake {
  position: absolute; left: 16px; right: 16px; margin: 0 auto; max-width: 420px;
  bottom: calc(var(--nav-h) + 18px + env(safe-area-inset-bottom));
  display: flex; gap: 12px; align-items: flex-start;
  padding: 14px 16px; border-radius: var(--r-lg);
  background: color-mix(in srgb, var(--surface) 90%, transparent);
  border: 1px solid var(--line); box-shadow: 0 10px 28px -16px var(--shadow);
}
.isl-wake .iw-emoji { font-size: 22px; line-height: 1.2; flex: 0 0 auto; }
.isl-wake p { font-size: 13px; color: var(--ink-2); margin: 0; }

/* Vue LISTE — miroir sémantique de la scène (accessibilité non négociable) */
.isl-list {
  flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch;
  max-width: 560px; width: 100%; margin: 0 auto;
  padding: 4px 20px calc(var(--nav-h) + 28px + env(safe-area-inset-bottom));
}
.isl-list-lead { color: var(--ink-2); font-size: 14px; max-width: 48ch; margin: 4px 0 18px; }
.isl-list-h { font-size: 13px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
  color: var(--ink-2); margin: 20px 0 10px; }
.isl-items { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.isl-item {
  display: flex; align-items: center; gap: 14px; min-height: 60px;
  padding: 12px 16px; background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-md);
}
.isl-item:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.isl-item .ii-emoji { font-size: 24px; flex: 0 0 auto; opacity: .85; }
.isl-item .ii-main { display: flex; flex-direction: column; min-width: 0; }
.isl-item .ii-title { font-weight: 700; font-size: 15px; color: var(--ink); display: flex; align-items: center; gap: 8px; }
.isl-item .ii-state { font-size: 12px; color: var(--ink-2); margin-top: 2px; }
/* Parcelle bâtie (Phase 2.2) : petit badge de niveau + liseré doré (jamais la couleur seule —
   l'état est aussi écrit en toutes lettres dans ii-state et l'aria-label). */
.isl-item.built { border-color: var(--gold); }
.isl-item .ii-lv {
  font-size: 11px; font-weight: 800; letter-spacing: .02em;
  padding: 2px 7px; border-radius: var(--r-pill);
  background: var(--gold-soft); color: var(--ink); border: 1px solid var(--gold);
  font-variant-numeric: tabular-nums;
}

/* ============================ REDUCED MOTION ============================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .001ms !important;
    scroll-behavior: auto !important;
  }
}

</style>

<div id="splash" aria-hidden="true"><div class="splash-mark">ASCEND</div></div>
<div id="app"></div>

<script>
/* ASCEND v2 — store central & persistance increvable (Phase 0.2).
   Aucune UI ici : le socle de données du TDD §4, monté AVANT tout écran.
   Expose window.AscendStore (état + save/load/date) et window.__test (harnais console).

   Invariants tenus ici (CLAUDE.md / TDD §4) :
   - hydratation TYPE-VALIDÉE : une valeur corrompue est larguée, le défaut reprend,
     l'app boote TOUJOURS ;
   - migrations NON destructives ; une save de version FUTURE → refus propre (repart du seed) ;
   - rien de punitif dans le moteur de dates : le changement de jour ne fait que ré-ancrer
     la date (l'historique est daté à la création ; aucune série n'existe, rien n'est retiré) ;
   - export & suppression RÉELS (Blob téléchargé / localStorage vidé) ;
   - 0 requête réseau (localStorage + Blob local uniquement). */
(function () {
  'use strict';

  var SAVE_VERSION = 1;
  var SAVE_KEY = 'ascend2.save.v1';
  // Garde-fou de sécurité : borne le nombre de jours civils qu'un rollover prend en
  // compte (horloge sautée de plusieurs années). Le rollover v2 est O(1) — il ne fait
  // que ré-ancrer la date — donc il n'y a AUCUNE boucle par jour à faire diverger ;
  // cette borne clampe la valeur « jours écoulés » rapportée (dayRollover().advanced),
  // seule donnée qu'un futur regroupement de timeline consommera.
  var MAX_ROLL = 3660; // ~10 ans

  /* ---------------------------------------------------------------- localStorage sûr */
  // Enveloppé de try/catch : dans un contexte où localStorage est absent/bloqué
  // (navigation privée iOS pleine, sandbox), on retombe silencieusement en mémoire —
  // JAMAIS de throw au boot.
  function lsGet(k) { try { if (typeof localStorage === 'undefined' || !localStorage) return null; return localStorage.getItem(k); } catch (e) { return null; } }
  function lsSet(k, v) { try { if (typeof localStorage === 'undefined' || !localStorage) return false; localStorage.setItem(k, v); return true; } catch (e) { return false; } }
  function lsDel(k) { try { if (typeof localStorage !== 'undefined' && localStorage) localStorage.removeItem(k); } catch (e) { } }

  /* ------------------------------------------------------------------ moteur de dates */
  // Jours civils LOCAUX. dayIndex() calcule via Date.UTC sur les composantes (an/mois/jour)
  // → insensible à l'heure et au DST (deux clés du même jour → même index).
  function todayKey() {
    if (typeof Date === 'undefined') return '';
    var d = new Date();
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var j = ('0' + d.getDate()).slice(-2);
    return d.getFullYear() + '-' + m + '-' + j;
  }
  function dayIndex(key) {
    if (!key) return NaN;
    var p = ('' + key).split('-');
    if (p.length !== 3) return NaN;
    var v = Date.UTC(+p[0], (+p[1]) - 1, +p[2]);
    return isNaN(v) ? NaN : Math.floor(v / 86400000);
  }

  /* --------------------------------------------------------------------- défauts §4 */
  function defaults() {
    var today = todayKey();
    return {
      name: '',
      onboarded: false,
      createdAt: today,             // jour civil du 1er lancement (figé, persisté)
      lastDay: today,               // ancre du moteur de dates (R5 v1)
      habits: [],                   // [{id,title,domain,freq,count,createdAt}]
      objectives: [],               // [{id,title,domain,baseline,milestonesHit:[],done}]
      activeQuest: null,            // {id,startedAt} | null (vrai startedAt conservé, P0-7 v1)
      history: [],                  // [{kind,refId,domain,day,elan}]
      chests: [],                   // [{id,type,domain,sourceLabel,day}] non ouverts
      inventory: [],                // [{id,itemId,day,sourceLabel,photoId|null,note|null}]
      placements: [],               // [{invId,zone,x,y}]
      buildings: {},                // {<domain>:{placed:bool}} — le NIVEAU est DÉRIVÉ, jamais stocké
      pity: { ironSinceRare: 0 },
      settings: { reducedMotion: 'auto', theme: null }
    };
  }

  /* --------------------------------------------------------- persistance : allowlist */
  // Allowlist EXPLICITE des champs persistés (= données de jeu). Toute clé d'UI éphémère
  // (onglet, overlay, sélection…) reste hors de cette liste → jamais sérialisée.
  var PERSIST_KEYS = ['name', 'onboarded', 'createdAt', 'lastDay', 'habits', 'objectives',
    'activeQuest', 'history', 'chests', 'inventory', 'placements', 'buildings', 'pity', 'settings'];

  // Schéma de TYPE par clé. Une valeur du mauvais type est LARGUÉE au chargement (le défaut
  // reprend) → une save corrompue (history:'x', buildings:42) ne peut plus atteindre le rendu.
  var PERSIST_TYPES = {
    name: 'str', onboarded: 'bool', createdAt: 'str', lastDay: 'str?',
    habits: 'arr', objectives: 'arr', activeQuest: 'obj?', history: 'arr',
    chests: 'arr', inventory: 'arr', placements: 'arr', buildings: 'obj',
    pity: 'obj', settings: 'obj'
  };

  function _okType(v, kind) {
    switch (kind) {
      case 'num': return typeof v === 'number' && isFinite(v);
      case 'str': return typeof v === 'string';
      case 'str?': return v === null || typeof v === 'string';
      case 'bool': return typeof v === 'boolean';
      case 'arr': return Array.isArray(v);
      case 'obj': return v !== null && typeof v === 'object' && !Array.isArray(v);
      case 'obj?': return v === null || (typeof v === 'object' && !Array.isArray(v));
      default: return true; // clé hors schéma → tolérante
    }
  }
  function _isPlainObj(o) { return o !== null && typeof o === 'object' && !Array.isArray(o); }

  // Les tableaux de « records » ne gardent que des objets simples (une entrée corrompue
  // — nombre, null, tableau imbriqué — est écartée, le reste survit).
  var RECORD_ARRAYS = ['habits', 'objectives', 'history', 'chests', 'inventory', 'placements'];

  /* ---------------------------------------------------------------------- serialize */
  // Sérialise le sous-ensemble persisté (+ n° de version). Sert à l'écriture ET de
  // signature de dedup (on n'écrit pas si le blob n'a pas changé).
  function serialize(state) {
    var o = { v: SAVE_VERSION };
    for (var i = 0; i < PERSIST_KEYS.length; i++) { var k = PERSIST_KEYS[i]; o[k] = state[k]; }
    return JSON.stringify(o);
  }

  /* --------------------------------------------------------------------- migrateSave */
  // Migration NON destructive. v1 = forme courante → aucune transformation. Une save d'une
  // version PLUS RÉCENTE (v>SAVE_VERSION, ex : livrable rétrogradé) n'est pas rétro-migrable
  // → null = repart du seed (refus PROPRE, jamais de crash, jamais d'écrasement silencieux).
  // Futures montées : `if (v < 2) { …transform…; v = 2; }` ici, puis bump SAVE_VERSION.
  function migrateSave(data) {
    if (!data || typeof data !== 'object') return null;
    var v = (typeof data.v === 'number') ? data.v : 1; // toutes 1res saves sans champ v → v1
    if (v > SAVE_VERSION) return null;
    return data;
  }

  /* ------------------------------------------------------------------------ loadSave */
  // Lecture au boot : {} si absente/illisible/version future (repart du seed, jamais de crash).
  // Chaque champ est TYPE-VALIDÉ avant hydratation ; les tableaux de records sont filtrés.
  function loadSave() {
    try {
      var raw = lsGet(SAVE_KEY); if (!raw) return {};
      var data = null; try { data = JSON.parse(raw); } catch (e) { data = null; }
      data = migrateSave(data);
      if (!data) return {};
      var out = {};
      for (var i = 0; i < PERSIST_KEYS.length; i++) {
        var k = PERSIST_KEYS[i];
        if ((k in data) && _okType(data[k], PERSIST_TYPES[k])) out[k] = data[k];
      }
      for (var j = 0; j < RECORD_ARRAYS.length; j++) {
        var rk = RECORD_ARRAYS[j];
        if (Array.isArray(out[rk])) out[rk] = out[rk].filter(_isPlainObj);
      }
      return out;
    } catch (e) { return {}; }
  }

  /* --------------------------------------------------------------------------- store */
  var store = {
    state: null,
    _subs: [],
    _lastBlob: null,

    get: function () { return this.state; },

    // Mutation persistée : merge superficiel → écrit → notifie les abonnés.
    set: function (patch) {
      if (patch) for (var k in patch) if (patch.hasOwnProperty(k)) this.state[k] = patch[k];
      this.save();
      this._notify();
      return this.state;
    },

    // Mutation ÉPHÉMÈRE (UI transitoire) : ne persiste pas, notifie seulement.
    setQuiet: function (patch) {
      if (patch) for (var k in patch) if (patch.hasOwnProperty(k)) this.state[k] = patch[k];
      this._notify();
      return this.state;
    },

    // Écrit la save si le blob a changé (dedup → les frames de rendu ne provoquent
    // aucune écriture superflue).
    save: function () {
      var blob = serialize(this.state);
      if (blob === this._lastBlob) return false;
      lsSet(SAVE_KEY, blob);
      this._lastBlob = blob;
      return true;
    },

    subscribe: function (fn) {
      if (typeof fn !== 'function') return function () { };
      this._subs.push(fn);
      var self = this;
      return function () { var i = self._subs.indexOf(fn); if (i >= 0) self._subs.splice(i, 1); };
    },
    _notify: function () {
      for (var i = 0; i < this._subs.length; i++) {
        try { this._subs[i](this.state); } catch (e) { }
      }
    },

    /* --- moteur de dates (rollover DOUX, NON punitif) --- */
    // Recale `lastDay` sur le jour civil courant. Retourne {advanced} = nombre de jours
    // civils franchis (clampé MAX_ROLL, 0 si aucun). Aucune conséquence : pas de série,
    // rien n'est retiré — l'historique est déjà daté à la création.
    dayRollover: function () {
      var today = todayKey();
      if (!today) return { advanced: 0 };
      var last = this.state.lastDay;
      if (!last) { this.set({ lastDay: today }); return { advanced: 0 }; }   // 1er lancement / legacy → ancre
      if (last === today) return { advanced: 0 };                            // même jour → no-op (garde anti-réentrée)
      var elapsed = dayIndex(today) - dayIndex(last);
      if (isNaN(elapsed) || elapsed <= 0) { this.set({ lastDay: today }); return { advanced: 0 }; } // horloge en arrière → re-ancre sans conséquence
      this.set({ lastDay: today });                                          // avance → simple ré-ancrage
      return { advanced: Math.min(elapsed, MAX_ROLL) };
    },
    _bindVisibility: function () {
      if (this._visBound || typeof document === 'undefined') return;
      this._visBound = true;
      var self = this;
      document.addEventListener('visibilitychange', function () { if (!document.hidden) self.dayRollover(); });
    },

    /* --- export RÉEL (Blob JSON téléchargé, 0 réseau) --- */
    exportJson: function () {
      try {
        var pretty = JSON.stringify(JSON.parse(serialize(this.state)), null, 2);
        var blob = new Blob([pretty], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'ascend-sauvegarde-' + todayKey() + '.json';
        document.body.appendChild(a);
        a.click();
        a.parentNode && a.parentNode.removeChild(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
        return true;
      } catch (e) { return false; }
    },

    /* --- suppression RÉELLE (localStorage vidé, état ramené aux défauts) --- */
    wipe: function () {
      lsDel(SAVE_KEY);
      this.state = defaults();
      this._lastBlob = null;
      this.save();       // ré-écrit des défauts frais (createdAt = aujourd'hui)
      this._notify();
      return this.state;
    },

    /* --- boot --- */
    boot: function () {
      var loaded = loadSave();
      var st = defaults();
      for (var k in loaded) if (loaded.hasOwnProperty(k)) st[k] = loaded[k];
      this.state = st;
      this._lastBlob = null;
      this.dayRollover();  // rollover doux au boot (peut ré-ancrer lastDay)
      this.save();         // persiste (fige createdAt/lastDay d'un compte neuf ; normalise le format)
      this._bindVisibility();
      return this.state;
    },

    // Exposés pour l'UI et les tests.
    SAVE_VERSION: SAVE_VERSION,
    SAVE_KEY: SAVE_KEY,
    todayKey: todayKey,
    dayIndex: dayIndex
  };

  store.boot();
  window.AscendStore = store;

  /* --------------------------------------------------------- harnais de test console */
  // Écrit une save fabriquée dans localStorage, puis RECHARGE la page pour prouver que
  // le boot survit (état neuf · save existante · corrompue · version future).
  function _writeRaw(raw) { lsSet(SAVE_KEY, raw); }
  window.__test = {
    // seed(partial) : écrit une save valide v1 = défauts + surcharges, puis recharge.
    seed: function (partial) {
      var st = defaults();
      if (partial) for (var k in partial) if (partial.hasOwnProperty(k)) st[k] = partial[k];
      _writeRaw(serialize(st));
      location.reload();
      return 'seed écrit → reload…';
    },
    // corrupt() : JSON illisible → le boot repart du seed.
    corrupt: function () { _writeRaw('{ ceci n\'est pas: du JSON,,, '); location.reload(); return 'save corrompue (illisible) → reload…'; },
    // corruptTyped() : JSON valide mais champs mal typés → ils sont largués, les valides restent.
    corruptTyped: function () {
      var bad = { v: SAVE_VERSION, name: 'Léo', onboarded: true, history: 'PAS_UN_TABLEAU', buildings: 42, habits: [{ id: 'h1', title: 'ok' }, 999, null], settings: ['pas', 'un', 'objet'] };
      _writeRaw(JSON.stringify(bad));
      location.reload();
      return 'save mal typée écrite → reload (history/buildings/settings doivent retomber aux défauts, name/onboarded/habits[0] survivre)…';
    },
    // future() : version postérieure → migrateSave refuse → repart du seed (refus propre).
    future: function () {
      _writeRaw(JSON.stringify({ v: SAVE_VERSION + 1, name: 'DuFutur', onboarded: true }));
      location.reload();
      return 'save de version future écrite → reload (doit être refusée, boot neuf)…';
    },
    reset: function () { store.wipe(); return 'save supprimée + défauts ré-écrits.'; },
    // Inspecteurs (sans reload).
    state: function () { return store.get(); },
    dump: function () { try { return JSON.parse(lsGet(SAVE_KEY) || '{}'); } catch (e) { return { _illisible: true, raw: lsGet(SAVE_KEY) }; } },
    raw: function () { return lsGet(SAVE_KEY); },
    export: function () { return store.exportJson(); },
    // rollover(fakeLast) : force lastDay puis rejoue le rollover (test du moteur de dates).
    rollover: function (fakeLast) {
      if (typeof fakeLast === 'string') store.set({ lastDay: fakeLast });
      var r = store.dayRollover();
      return { advanced: r.advanced, lastDay: store.state.lastDay, today: todayKey() };
    }
  };
})();

/* ASCEND v2 — Moteur d'ambiance (Phase 0.3).
   Choisit le thème visuel selon l'HEURE LOCALE et l'applique via
   [data-ambiance] sur <html> (les tokens sont dans styles.css) :
     nuit        21 h → 06 h   (nuit étoilée)
     crepuscule  06 h → 08 h   (aube)  ·  19 h → 21 h  (couchant)
     jour        08 h → 19 h   (jour doux)
   Le vrai ciel animé + météo de l'île se grefferont sur ces mêmes tokens
   plus tard ; ici on ne pose que la FONDATION (thème + fondu + re-check).

   API : window.AscendAmbiance = { pick(date), apply(name), auto(), current(), mode() }.
   - auto()  : mode automatique, suit l'horloge (re-check chaque minute) ;
   - apply() : force une ambiance (mode manuel — utilisé par la page de spécimens). */
(function () {
  'use strict';
  var VALID = { jour: 1, crepuscule: 1, nuit: 1 };
  var root = document.documentElement;
  var mode = 'auto';        // 'auto' | 'manual'
  var timer = null;

  // Heure → nom d'ambiance. Bornes inclusives basses, exclusives hautes.
  function pick(date) {
    var h = (date || new Date()).getHours();
    if (h >= 21 || h < 6) return 'nuit';
    if (h < 8 || h >= 19) return 'crepuscule';   // 6–8 (aube) · 19–21 (couchant)
    return 'jour';                               // 8–19
  }

  function set(name) {
    if (!VALID[name]) name = 'jour';
    if (root.getAttribute('data-ambiance') !== name) {
      root.setAttribute('data-ambiance', name);
    }
    return name;
  }

  function auto() {
    mode = 'auto';
    var name = set(pick(new Date()));
    if (!timer) {
      // Re-check périodique : franchir une borne bascule l'ambiance en douceur
      // (le fondu est purement CSS ; coupé sous prefers-reduced-motion).
      timer = setInterval(function () { if (mode === 'auto') set(pick(new Date())); }, 60000);
    }
    return name;
  }

  function apply(name) {
    mode = 'manual';
    return set(name);
  }

  window.AscendAmbiance = {
    pick: pick,
    apply: apply,
    auto: auto,
    current: function () { return root.getAttribute('data-ambiance') || 'jour'; },
    mode: function () { return mode; }
  };

  // Applique immédiatement (avant le premier paint de app.js) : pas de flash.
  auto();
})();

/* ASCEND v2 — Coffres : LE canal unique de récompense (données pures ; Phase 1.2, refondu
   Phase 1.4). Arbitrage Leo (Phase 1.4) : le MATÉRIAU du coffre = le NIVEAU DE RARETÉ de
   l'objet qu'il contient (échelle à 6, cards.js). Plus le matériau est précieux, plus le
   coffre est rare à obtenir. La SOURCE de l'effort (habitude ? quête ? objectif ?) n'est
   plus portée par le matériau : elle est dite par le `sourceLabel` de chaque coffre.

   | matériau      | rareté de l'objet | produit par (Phase) |
   |---------------|-------------------|---------------------|
   | bois          | commun            | habitude 1.2 · quête courte 1.4 |
   | fer           | rare              | quête 1.4 |
   | or            | epique            | quête longue 1.4 · jalon 1.5 |
   | cristal       | legendaire        | objectif · niveau de bâtiment (2.2/4.1) — DÉCLARÉ |
   | obsidienne    | exceptionnel      | (source à venir) — DÉCLARÉ |
   | aube          | unique            | relique / collection complète — DÉCLARÉ |

   En Phase 1.4 seuls bois/fer/or sont PRODUITS (donc seuls eux ont une vignette CSS —
   zéro palette orpheline) ; cristal/obsidienne/aube sont déclarés pour la lisibilité du
   modèle et alimentés dans leur phase. Aucune logique : la liste + accès (dont rarityOf,
   consommé par le tirage derive.drawForChest). Apostrophes FR = ’ (U+2019). */
(function () {
  'use strict';

  // Ordre = rareté croissante (aligné sur cards.RARITIES). `rarity` fait le pont matériau→objet.
  var TYPES = [
    { id: 'bois',       label: 'Coffre de bois',       rarity: 'commun',       source: 'validation d’une habitude · quête courte' },
    { id: 'fer',        label: 'Coffre de fer',        rarity: 'rare',         source: 'quête minutée accomplie' },
    { id: 'or',         label: 'Coffre d’or',          rarity: 'epique',       source: 'quête longue · jalon franchi' },
    { id: 'cristal',    label: 'Coffre de cristal',    rarity: 'legendaire',   source: 'objectif accompli · niveau de bâtiment' },
    { id: 'obsidienne', label: 'Coffre d’obsidienne',  rarity: 'exceptionnel', source: 'récompense d’exception (à venir)' },
    { id: 'aube',       label: 'Coffre d’aube',        rarity: 'unique',       source: 'relique · collection complète (à venir)' }
  ];

  var byId = {};
  for (var i = 0; i < TYPES.length; i++) byId[TYPES[i].id] = TYPES[i];

  window.AscendChests = {
    list: TYPES,
    get: function (id) { return byId[id] || null; },
    has: function (id) { return Object.prototype.hasOwnProperty.call(byId, id); },
    // Rareté de l'objet qu'un coffre de ce matériau révèle (le pont consommé par le tirage).
    // Matériau inconnu (save bricolée) → 'commun' (repli serein, jamais de crash au tirage).
    rarityOf: function (id) { return byId[id] ? byId[id].rarity : 'commun'; }
  };
})();

   Le contenu qu'un coffre révèle vient d'ICI (tiré à l'OUVERTURE — la logique de tirage
   est dans derive.js ; ce fichier ne fait que déclarer le catalogue + le résoudre).

   Placeholders v0 : chaque objet = { id, domain, name, rarity }. Les histoires complètes
   (métadonnées narratives, art) = Phase 6.1 ; ici, un nom évocateur suffit.

      { id: 'bien_c3', name: 'Tasse fumante',    rarity: 'commun' },
      { id: 'bien_c4', name: 'Coussin moelleux', rarity: 'commun' },
      { id: 'bien_c5', name: 'Feuille de menthe',rarity: 'commun' },
      { id: 'bien_c6', name: 'Plume d’oreiller', rarity: 'commun' },
      { id: 'bien_r1', name: 'Fleur de quiétude',rarity: 'rare' },
      { id: 'bien_e1', name: 'Source paisible',  rarity: 'epique' }
    ]
  };

  // Index plat id → objet enrichi de son domaine (le domaine vient de la clé de POOLS,
  // pas dupliqué dans chaque record). `byRarityDom[domain][rarity]` = le vivier d'un tirage
  // (le tirage pioche SANS REMISE dans le vivier de la rareté du coffre — derive.js).
  var byId = {};
  var byRarityDom = {};
  for (var dom in POOLS) {
    if (!POOLS.hasOwnProperty(dom)) continue;
    byRarityDom[dom] = {};
    var arr = POOLS[dom];
    for (var i = 0; i < arr.length; i++) {
      var it = arr[i];
      var card = { id: it.id, domain: dom, name: it.name, rarity: it.rarity };
      byId[card.id] = card;
      (byRarityDom[dom][card.rarity] || (byRarityDom[dom][card.rarity] = [])).push(card);
    }
  }

  // Décos génératives (déco quand le pool de communs d'un domaine est épuisé, §4.3).
  // Toujours embellissantes ; nom déterministe du seul id (aucune donnée stockée).
  var GEN_FLAVORS = [
    'Galet du rivage', 'Jeune pousse', 'Sentier de pierres',
    'Fleur des champs', 'Rocher moussu', 'Éclat de lumière'
  ];

  /* ------------------------------------------------ jalons d'habitude (Phase 1.5) */
  // Cartes-jalons UNIQUES et DÉTERMINISTES (GDD §5.3) : franchir un seuil de validations
  // GARANTIT sa carte-jalon — le hasard ne porte JAMAIS sur le mémorable. Chaque seuil →
  // un matériau de coffre (montée douce, arbitrage Leo : 10/25 or·épique · 50 cristal·
  // légendaire · 100 aube·unique) + une vertu. La carte PORTE la rareté du coffre (le pont
  // chests.rarityOf). Un coffre de jalon force sa carte via `chest.cardId` (derive.drawForChest).
  //
  // Id d'une carte-jalon = `mile_<domaine>_<habitId>_<seuil>` → UNIQUE par (habitude × seuil)
  // donc jamais de doublon dans l'inventaire. resolve() n'a besoin que du DOMAINE (préfixe,
  // sans underscore) et du SEUIL (suffixe numérique) : le nom/rareté se DÉRIVENT du seuil,
  // pur et stable même si l'habitude est supprimée. Le souvenir précis (habitude, date) vit
  // dans le sourceLabel du coffre, repris à l'ouverture (comme toute carte, §5.2).
  var MILESTONES = [
    { threshold: 10,  tier: 'or',      virtue: 'Constance' },
    { threshold: 25,  tier: 'or',      virtue: 'Persévérance' },
    { threshold: 50,  tier: 'cristal', virtue: 'Maîtrise' },
    { threshold: 100, tier: 'aube',    virtue: 'Légende' }
  ];
  var milestoneByThreshold = {};
  for (var mi = 0; mi < MILESTONES.length; mi++) milestoneByThreshold[MILESTONES[mi].threshold] = MILESTONES[mi];

  // Rareté d'un matériau de coffre (pont vers chests.js, chargé avant ce fichier). Repli
  // 'epique' si le module manquait (jamais en pratique) → aucun crash au rendu.
  function tierRarity(tier) {
    return (window.AscendChests && window.AscendChests.rarityOf) ? window.AscendChests.rarityOf(tier) : 'epique';
  }
  // Le jalon franchi À CE compteur (exactement un seuil ou aucun) : appelé après validation,
  // count === seuil ⇒ jalon atteint. Retourne le descripteur { threshold, tier, virtue } ou null.
  function milestoneAt(count) {
    return milestoneByThreshold[count] || null;
  }
  // Fabrique l'id de la carte-jalon d'une (habitude, seuil) — source unique de la convention d'id.
  function milestoneCardId(domain, habitId, threshold) {
    return 'mile_' + domain + '_' + habitId + '_' + threshold;
  }

  // Hash de chaîne déterministe (FNV-1a 32 bits) — sert au tirage (derive.js) ET au choix
  // de saveur générative. Pur, sans réseau, stable entre sessions.
  function hash(s) {
    s = '' + s;
    var h = 2166136261 >>> 0;
    for (var i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619) >>> 0;
    }
    return h >>> 0;
  }

  function unknown(itemId) {
    return { id: itemId || '?', domain: '', name: 'Objet mystère', rarity: 'commun', generative: false, unknown: true };
  }

  // Résout un itemId (stocké minimal dans inventory) en objet affichable. Gère le catalogue
  // fixe ET les décos génératives (`gen_<domaine>_<n>`) ; itemId inconnu (save bricolée) →
  // repli serein (jamais de crash au rendu de la collection).
  function resolve(itemId) {
    if (typeof itemId !== 'string' || !itemId) return unknown(itemId);
    if (byId[itemId]) return byId[itemId];
    if (itemId.indexOf('gen_') === 0) {
      var parts = itemId.split('_');            // ['gen', <domaine>, <n>]
      var domain = parts[1] || '';
      var flavor = GEN_FLAVORS[hash(itemId) % GEN_FLAVORS.length];
      return { id: itemId, domain: domain, name: flavor, rarity: 'commun', generative: true };
    }
    if (itemId.indexOf('mile_') === 0) {        // carte-jalon : mile_<domaine>_<habitId...>_<seuil>
      var mp = itemId.split('_');
      var mdomain = mp[1] || '';
      var th = parseInt(mp[mp.length - 1], 10); // le seuil = suffixe numérique (habitId au milieu ignoré)
      var ms = milestoneByThreshold[th];
      if (ms) {
        return {
          id: itemId, domain: mdomain,
          name: th + 'ᵉ — ' + ms.virtue,         // ex. « 10ᵉ — Constance » (déterministe)
          rarity: tierRarity(ms.tier), milestone: true, threshold: th
        };
      }
      return unknown(itemId);
    }
    return unknown(itemId);
  }

  // Fabrique l'id d'une déco générative (le n-ième déjà généré pour ce domaine → id unique)
  // et le résout. Utilisé par le tirage quand le pool de communs est vide.
  function makeGenerative(domain, n) {
    return resolve('gen_' + domain + '_' + (n | 0));
  }

  window.AscendCards = {
    pools: POOLS,
    rarities: RARITIES,
    rarityLabel: function (id) { return rarityById[id] ? rarityById[id].label : 'Commun'; },
    rarityRank: function (id) { return rarityById[id] ? rarityById[id].rank : 1; },
    // Vivier d'un domaine pour une rareté donnée (copie défensive). Vide si le domaine n'a
    // pas (encore) d'objet de cette rareté — le tirage retombera alors sur une déco générative.
    byDomainRarity: function (domain, rarity) {
      return (byRarityDom[domain] && byRarityDom[domain][rarity]) ? byRarityDom[domain][rarity].slice() : [];
    },
    // Conservé (Phase 1.3) : le vivier commun d'un domaine = cas particulier de byDomainRarity.
    commonsByDomain: function (domain) { return this.byDomainRarity(domain, 'commun'); },
    get: resolve,
    resolve: resolve,
    makeGenerative: makeGenerative,
    // Jalons d'habitude (Phase 1.5) : catalogue + résolution déterministe des cartes-jalons.
    milestones: MILESTONES,
    milestoneAt: milestoneAt,
    milestoneCardId: milestoneCardId,
    hash: hash
  };
})();
