/* ASCEND v2 — Dérivé (Phase 1.1).
   INVARIANT structurel : tout ce qui est précieux et calculable se DÉRIVE ici
   depuis history/inventory — jamais stocké (un save édité à la main ne peut pas
   s'inventer un compteur). Ce fichier grandira (élan, niveaux, pools, jalons) ;
   la Phase 1.1 n'a besoin que du compteur d'habitude et du « déjà validée ce jour ? ».
   Fonctions PURES : elles lisent l'état passé, ne mutent rien. */
(function () {
  'use strict';

  var cards = window.AscendCards;
  var chestTypes = window.AscendChests;
  var domains = window.AscendDomains;

  function historyOf(state) {
    return (state && Array.isArray(state.history)) ? state.history : [];
  }
  function inventoryOf(state) {
    return (state && Array.isArray(state.inventory)) ? state.inventory : [];
  }

  // Compteur cumulatif d'une habitude = nombre d'entrées d'historique la référençant.
  // Jamais perdu, jamais stocké : c'est le remplaçant SAIN du streak (on compte ce qui
  // a été FAIT, pas les jours consécutifs — GDD §3.1).
  function habitCount(state, habitId) {
    var hist = historyOf(state), n = 0;
    for (var i = 0; i < hist.length; i++) {
      var e = hist[i];
      if (e && e.kind === 'habit' && e.refId === habitId) n++;
    }
    return n;
  }

  // Une habitude est-elle déjà validée pour le jour civil `day` (clé todayKey()) ?
  // Garde d'or : on ne valide JAMAIS deux fois la même habitude le même jour civil.
  function isHabitValidatedOn(state, habitId, day) {
    if (!day) return false;
    var hist = historyOf(state);
    for (var i = 0; i < hist.length; i++) {
      var e = hist[i];
      if (e && e.kind === 'habit' && e.refId === habitId && e.day === day) return true;
    }
    return false;
  }

  /* ------------------------------------------------ tirage de coffre (Phase 1.3) */
  // Le contenu d'un coffre est DÉRIVÉ à l'ouverture, jamais stocké à l'obtention (TDD §4,
  // GDD §4.3). C'est une fonction PURE de (state, chest) : re-calculable, IDEMPOTENTE tant
  // que le coffre n'est pas ouvert (même chestId → même objet), mais FIGÉE seulement au
  // moment où actions.openChest écrit l'entrée d'inventory.
  //
  // Seed = hash(createdAt + chestId) → indépendante de l'horloge, stable entre sessions.
  // Sans remise : on retire du pool du domaine les objets DÉJÀ possédés (aucun doublon).
  // Pool de communs épuisé → déco générative déterministe (n = nombre de génératifs déjà
  // possédés dans ce domaine → id unique). En 1.3 : Coffre de bois → 1 COMMUN.

  function ownedItemIds(state) {
    var inv = inventoryOf(state), set = {};
    for (var i = 0; i < inv.length; i++) {
      var e = inv[i];
      if (e && typeof e.itemId === 'string') set[e.itemId] = true;
    }
    return set;
  }

  // Combien de décos génératives ce domaine a-t-il déjà produites (dans inventory) ?
  // Sert à donner à la prochaine un id unique (gen_<domaine>_<n>).
  function generativeCountInDomain(state, domain) {
    var inv = inventoryOf(state), n = 0;
    for (var i = 0; i < inv.length; i++) {
      var e = inv[i];
      if (!e || typeof e.itemId !== 'string') continue;
      var it = cards.resolve(e.itemId);
      if (it && it.generative && it.domain === domain) n++;
    }
    return n;
  }

  // Le contenu tiré = un objet de la RARETÉ du coffre (matériau → rareté, chests.rarityOf).
  // En 1.3 le bois donnait un commun ; en 1.4 le fer donne un rare, l'or un épique — MÊME
  // fonction (généralisée), pas de nouveau canal. Sans remise dans le vivier de cette rareté ;
  // vivier épuisé (pools v0 : 1 rare / 1 épique par domaine) → déco générative (GDD §4.3).
  function drawForChest(state, chest) {
    if (!chest || !chest.domain) return null;
    var rarity = chestTypes.rarityOf(chest.type);
    var seed = cards.hash((state && state.createdAt ? state.createdAt : '') + '|' + chest.id);
    var owned = ownedItemIds(state);
    var pool = cards.byDomainRarity(chest.domain, rarity).filter(function (c) { return !owned[c.id]; });
    if (pool.length) return pool[seed % pool.length];
    // Vivier épuisé → déco générative (embellit toujours l'île, rareté commune, GDD §4.3).
    return cards.makeGenerative(chest.domain, generativeCountInDomain(state, chest.domain));
  }

  /* -------------------------------------------- quêtes minutées (Phase 1.4) */
  // Une quête active est-elle EXPLOITABLE ? (obj?, non type-validé en profondeur au chargement
  // — une save bricolée peut porter un activeQuest incohérent → on le traite comme « aucune »
  // pour ne jamais bloquer le boot ni fausser le chrono.)
  function isValidActiveQuest(aq) {
    return !!(aq && typeof aq.id === 'string' &&
      domains.has(aq.domain) &&
      typeof aq.minutes === 'number' && isFinite(aq.minutes) && aq.minutes > 0 &&
      typeof aq.startedAt === 'number' && isFinite(aq.startedAt) && aq.startedAt > 0);
  }

  // Élan d'une quête selon sa durée (GDD §6.2 : quête = +2 à +4). Nourrit l'historique dès
  // maintenant (les niveaux de bâtiment le consommeront en Phase 2.2). Court/moyen/long.
  function questElan(minutes) {
    if (!(minutes > 0)) return 2;
    if (minutes < 15) return 2;
    if (minutes < 45) return 3;
    return 4;
  }

  // Progression d'une quête à l'instant `nowMs` (Date.now() passé par l'appelant → fonction
  // PURE et testable). Le chrono est RÉEL : elapsed = maintenant − startedAt (persistant,
  // repris après reload — leçon v1 P0-7). Gate NON punitif à 50 % ; « longue reprise »
  // automatiquement débloquée puisque elapsed croît avec l'horloge murale.
  function questProgress(aq, nowMs) {
    var targetMs = aq.minutes * 60000;
    var elapsedMs = Math.max(0, nowMs - aq.startedAt);
    var gateMs = targetMs * 0.5;
    var ratio = targetMs > 0 ? elapsedMs / targetMs : 1;   // 0→1+ vers la durée CIBLE (l'anneau)
    return {
      elapsedMs: elapsedMs,
      targetMs: targetMs,
      remainingToTargetMs: Math.max(0, targetMs - elapsedMs),
      remainingToGateMs: Math.max(0, gateMs - elapsedMs),
      progress: Math.max(0, Math.min(1, ratio)),           // borné pour l'anneau
      gateReached: elapsedMs >= gateMs                      // « J'ai fini » débloqué
    };
  }

  // Tables de PONDÉRATION du tier de coffre par durée (arbitrage : plus la quête est longue,
  // meilleures les probas — GDD §4.2 « la rareté reflète l'effort réel »). Quêtes plafonnées
  // à or/épique (arbitrage Leo) : jamais cristal+ ici. Poids sur 10000 (bois·fer·or cumulés).
  var TIER_WEIGHTS = {
    court: { bois: 8000, fer: 1800, or: 200 },   // < 15 min
    moyen: { bois: 5500, fer: 3500, or: 1000 },  // 15–44 min
    long:  { bois: 3500, fer: 4500, or: 2000 }   // ≥ 45 min
  };
  function durationBucket(minutes) {
    if (minutes < 15) return 'court';
    if (minutes < 45) return 'moyen';
    return 'long';
  }
  var PITY_N = 7; // arbitrage Leo : 1 coffre « rare ou mieux » (fer+) garanti tous les 7 (pity.ironSinceRare).

  // Tire le MATÉRIAU (= rareté) du coffre d'une quête accomplie. Décidé À L'ACCOMPLISSEMENT
  // (le coffre PORTE ensuite sa rareté, visible dans la pile — arbitrage Leo « un niveau de
  // coffre par niveau de rareté ») ; l'OBJET précis reste tiré à l'ouverture (drawForChest).
  // DÉTERMINISTE : seed = hash(createdAt + quest.id + startedAt). PITIÉ : si l'on a déjà eu
  // PITY_N−1 bois d'affilée, ce coffre est remonté à `fer` minimum (malchance bornée).
  // Retourne { tier, wouldResetPity } — pity effectivement écrit par actions au moment du push.
  function rollQuestChestTier(state, aq) {
    var w = TIER_WEIGHTS[durationBucket(aq.minutes)];
    var seed = cards.hash((state && state.createdAt ? state.createdAt : '') + '|tier|' + aq.id + '|' + aq.startedAt);
    var roll = seed % 10000;
    var tier = 'bois';
    if (roll < w.or) tier = 'or';
    else if (roll < w.or + w.fer) tier = 'fer';
    else tier = 'bois';
    var since = (state && state.pity && typeof state.pity.ironSinceRare === 'number') ? state.pity.ironSinceRare : 0;
    if (tier === 'bois' && since >= PITY_N - 1) tier = 'fer';   // pitié : rare garanti
    return { tier: tier, resetsPity: tier !== 'bois' };
  }

  window.AscendDerive = {
    habitCount: habitCount,
    isHabitValidatedOn: isHabitValidatedOn,
    drawForChest: drawForChest,
    isValidActiveQuest: isValidActiveQuest,
    questElan: questElan,
    questProgress: questProgress,
    rollQuestChestTier: rollQuestChestTier,
    PITY_N: PITY_N
  };
})();

/* ASCEND v2 — Actions (mutations métier, Phases 1.1 → 1.2).
   Seul endroit qui MUTE l'état (via AscendStore.set → persistance + notify).
   Phase 1.1 : CRUD habitude + validation du jour. Phase 1.2 : la validation d'habitude
   PRODUIT en plus un Coffre de bois (le canal de récompense, GDD §4.1) — poussé dans
   `chests` (non ouvert : l'ouverture = Phase 1.3). L'entrée d'historique datée reste la
   source de vérité dont tout le dérivé découle.

   Rappel modèle (TDD §4) : le record d'habitude est {id,title,domain,freq,createdAt}.
   On N'Y STOCKE PAS `count` (pourtant listé §4) : le compteur est DÉRIVÉ de history
   (AscendDerive.habitCount) — invariant d'intégrité, prime sur la liste indicative. */
(function () {
  'use strict';

  var store = window.AscendStore;
  var derive = window.AscendDerive;
  var domains = window.AscendDomains;

  function uid(prefix) {
    // Identifiant local unique (aucun réseau) : temps + aléa, base36 compact.
    return (prefix || 'id') + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }
  function trim(s) { return (typeof s === 'string') ? s.replace(/^\s+|\s+$/g, '') : ''; }

  function findHabit(state, id) {
    var hs = state.habits || [];
    for (var i = 0; i < hs.length; i++) if (hs[i] && hs[i].id === id) return hs[i];
    return null;
  }

  // Crée une habitude. Retourne le record créé, ou null si invalide
  // (titre vide après trim, ou domaine hors des 5 domaines actifs).
  function createHabit(title, domain, freq) {
    var t = trim(title);
    if (!t || !domains.has(domain)) return null;
    var st = store.get();
    var habit = {
      id: uid('h'),
      title: t,
      domain: domain,
      freq: trim(freq),          // fréquence LIBRE (peut rester vide — GDD §3.1)
      createdAt: store.todayKey()
    };
    store.set({ habits: st.habits.concat([habit]) });
    return habit;
  }

  // Édite titre / domaine / fréquence d'une habitude. Ne touche NI id NI createdAt.
  // Un patch invalide (titre vidé, domaine inconnu) est simplement ignoré champ par champ.
  // Retourne true si l'habitude existait, false sinon.
  function editHabit(id, patch) {
    var st = store.get();
    if (!findHabit(st, id)) return false;
    patch = patch || {};
    var habits = st.habits.map(function (hb) {
      if (!hb || hb.id !== id) return hb;
      var next = { id: hb.id, title: hb.title, domain: hb.domain, freq: hb.freq, createdAt: hb.createdAt };
      if (typeof patch.title === 'string') { var tt = trim(patch.title); if (tt) next.title = tt; }
      if (domains.has(patch.domain)) next.domain = patch.domain;
      if (typeof patch.freq === 'string') next.freq = trim(patch.freq);
      return next;
    });
    store.set({ habits: habits });
    return true;
  }

  // Supprime le record d'habitude. On NE touche JAMAIS `history` : les entrées datées
  // restent (registre honnête de l'effort réel — invariant « rien de précieux dérivable
  // n'est détruit »). Une habitude supprimée n'est simplement plus affichée ni validable.
  // Retourne true si quelque chose a été retiré.
  function deleteHabit(id) {
    var st = store.get();
    var habits = st.habits.filter(function (hb) { return !(hb && hb.id === id); });
    if (habits.length === st.habits.length) return false;
    store.set({ habits: habits });
    return true;
  }

  // Valide une habitude pour AUJOURD'HUI. Garde d'or : jamais deux fois le même jour
  // civil pour la même habitude (s'appuie sur todayKey()/history via AscendDerive) —
  // donc jamais deux coffres pour la même habitude le même jour (le PUSH n'a lieu que
  // dans la branche « valide », après la garde). Alimente `history` (entrée datée,
  // elan +1 = poids habitude, GDD §6.2) ET `chests` (un Coffre de bois non ouvert,
  // avec son libellé de source — GDD §4.1 / §5.2). Une seule écriture (les deux clés
  // dans le même set → une save, une notification).
  // Retourne { ok, reason:'valide'|'deja'|'introuvable', count, chest } — count = cumul
  // dérivé ; chest = le coffre créé (ou undefined si non validé).
  function validateHabit(id) {
    var st = store.get();
    var habit = findHabit(st, id);
    if (!habit) return { ok: false, reason: 'introuvable', count: 0 };
    var day = store.todayKey();
    if (derive.isHabitValidatedOn(st, id, day)) {
      return { ok: false, reason: 'deja', count: derive.habitCount(st, id) };
    }
    var entry = { kind: 'habit', refId: id, domain: habit.domain, day: day, elan: 1 };
    var chest = {
      id: uid('c'),
      type: 'bois',
      domain: habit.domain,
      sourceLabel: 'Obtenu en validant « ' + habit.title + ' »',
      day: day
    };
    store.set({
      history: st.history.concat([entry]),
      chests: st.chests.concat([chest])
    });
    return { ok: true, reason: 'valide', count: derive.habitCount(store.get(), id), chest: chest };
  }

  function findChest(state, id) {
    var cs = state.chests || [];
    for (var i = 0; i < cs.length; i++) if (cs[i] && cs[i].id === id) return cs[i];
    return null;
  }

  // Ouvre un coffre : c'est ICI que le tirage (dérivé, idempotent tant que non ouvert) est
  // FIGÉ en une entrée d'inventory (GDD §4.3, TDD §4). Le coffre quitte la pile ; l'objet
  // rejoint la collection avec ses métadonnées-souvenir (§5.2) : date + source reprise du
  // coffre, photo/note à venir (Phase 7). Une seule écriture (chests + inventory).
  // Idempotent/robuste : coffre introuvable (déjà ouvert, id bidon) → no-op propre.
  // Retourne { ok, reason:'ouvert'|'introuvable', item, entry, chestType, sourceLabel }.
  function openChest(chestId) {
    var st = store.get();
    var chest = findChest(st, chestId);
    if (!chest) return { ok: false, reason: 'introuvable' };
    var item = derive.drawForChest(st, chest);   // tiré au moment de l'ouverture
    if (!item) return { ok: false, reason: 'introuvable' };
    var entry = {
      id: uid('inv'),
      itemId: item.id,                            // seul l'id est stocké ; le reste se dérive (cards.resolve)
      day: store.todayKey(),
      sourceLabel: chest.sourceLabel,             // le souvenir de l'action réelle, repris du coffre
      photoId: null,
      note: null
    };
    store.set({
      chests: st.chests.filter(function (c) { return !(c && c.id === chestId); }),
      inventory: st.inventory.concat([entry])
    });
    return { ok: true, reason: 'ouvert', item: item, entry: entry, chestType: chest.type, sourceLabel: chest.sourceLabel };
  }

  /* ------------------------------------------------ quêtes minutées (Phase 1.4) */
  // Démarre une quête (catalogue OU perso). UN SEUL chrono actif (arbitrage Leo) : si une
  // quête VALIDE tourne déjà, on refuse (l'UI le dit doucement). Un activeQuest incohérent
  // (save bricolée) n'est PAS un obstacle → il est écrasé. `startedAt` = horloge murale
  // RÉELLE (Date.now()), persistée → reprise exacte après reload (leçon v1 P0-7). Aucune
  // récompense n'est SAISIE : elle sera dérivée de la durée à l'accomplissement.
  // spec = { questId|null, title, domain, minutes }. Retourne { ok, reason, quest }.
  function startQuest(spec) {
    spec = spec || {};
    var title = trim(spec.title);
    var minutes = +spec.minutes;
    if (!title || !domains.has(spec.domain) || !(minutes > 0)) return { ok: false, reason: 'invalide' };
    var st = store.get();
    if (derive.isValidActiveQuest(st.activeQuest)) return { ok: false, reason: 'deja_active' };
    var quest = {
      id: uid('q'),
      questId: (typeof spec.questId === 'string' && spec.questId) ? spec.questId : null,
      title: title,
      domain: spec.domain,
      minutes: minutes,
      startedAt: Date.now()
    };
    store.set({ activeQuest: quest });
    return { ok: true, reason: 'demarree', quest: quest };
  }

  // Accomplit la quête active. Gate NON punitif : refus PROPRE tant que < 50 % (rien n'est
  // retiré, aucune trace). Sinon : tire le MATÉRIAU du coffre (durée + pitié, decidé ICI →
  // le coffre porte sa rareté), pousse le coffre dans `chests` (ouverture = cérémonie 1.3),
  // date l'historique (kind:'quest', elan §6.2), met à jour la PITIÉ (bois → +1 ; fer+ → 0),
  // et libère le chrono. Une seule écriture. Retourne { ok, reason, chest, tier, elan }.
  function finishQuest() {
    var st = store.get();
    var aq = st.activeQuest;
    if (!derive.isValidActiveQuest(aq)) return { ok: false, reason: 'aucune' };
    var prog = derive.questProgress(aq, Date.now());
    if (!prog.gateReached) return { ok: false, reason: 'trop_tot', remainingToGateMs: prog.remainingToGateMs };

    var roll = derive.rollQuestChestTier(st, aq);
    var tier = roll.tier;                                   // 'bois' | 'fer' | 'or'
    var day = store.todayKey();
    var elan = derive.questElan(aq.minutes);
    var chest = {
      id: uid('c'),
      type: tier,
      domain: aq.domain,
      sourceLabel: 'Obtenu en accomplissant « ' + aq.title + ' » (' + aq.minutes + ' min)',
      day: day
    };
    var entry = { kind: 'quest', refId: (aq.questId || aq.id), domain: aq.domain, day: day, elan: elan };
    var since = (st.pity && typeof st.pity.ironSinceRare === 'number') ? st.pity.ironSinceRare : 0;
    var nextSince = (tier === 'bois') ? (since + 1) : 0;    // pitié : reset dès un fer+ (rare ou mieux)

    store.set({
      history: st.history.concat([entry]),
      chests: st.chests.concat([chest]),
      pity: { ironSinceRare: nextSince },
      activeQuest: null
    });
    return { ok: true, reason: 'accompli', chest: chest, tier: tier, elan: elan };
  }

  // Abandonne la quête active. NON punitif (avant OU après 50 %) : rien n'est retiré, aucune
  // trace d'historique, aucune honte — le chrono est simplement libéré (GDD §3.2). Idempotent.
  function abandonQuest() {
    var st = store.get();
    if (!st.activeQuest) return { ok: false, reason: 'aucune' };
    store.set({ activeQuest: null });
    return { ok: true, reason: 'abandonnee' };
  }

  window.AscendActions = {
    createHabit: createHabit,
    editHabit: editHabit,
    deleteHabit: deleteHabit,
    validateHabit: validateHabit,
    openChest: openChest,
    startQuest: startQuest,
    finishQuest: finishQuest,
    abandonQuest: abandonQuest
  };
})();

/* ASCEND v2 — Racine de l'app.
   Phase 1.1 : PREMIER VRAI ÉCRAN — Habitudes (créer, lister, éditer, supprimer,
   valider le jour). Remplace la page de spécimens 0.3 (les styles restent la banque
   du design system). L'ambiance suit désormais l'heure automatiquement (ambiance.js).

   État d'UI éphémère (formulaires, édition, confirmation) = variables de module,
   JAMAIS persistées (le store ne voit que les mutations métier via AscendActions).
   Re-rendu : abonnement au store (mutations) + paint() explicite (frappe clavier). */
(function () {
  'use strict';
  var h = window.preact.h;
  var render = window.preact.render;
  var html = window.htm.bind(h);
  var store = window.AscendStore;
  var actions = window.AscendActions;
  var derive = window.AscendDerive;
  var domains = window.AscendDomains;
  var chestTypes = window.AscendChests;
  var cards = window.AscendCards;
  var quests = window.AscendQuests;
  var VER = '0.07';

  var DURATION_PRESETS = [5, 10, 15, 20, 30, 45, 60, 90]; // minutes proposées (perso) — GDD §13.

  /* ------------------------------------------------------------ état d'UI éphémère */
  var ui = {
    form: { title: '', domain: domains.list[0].id, freq: '' },
    editingId: null,
    edit: { title: '', domain: '', freq: '' },
    confirmDeleteId: null,
    ceremony: null,           // { phase:'suspense'|'reveal', chestType, item, sourceLabel } | null
    quest: {
      domain: domains.list[0].id,                                   // filtre du catalogue
      perso: { title: '', domain: domains.list[0].id, minutes: 20 },// quête personnalisée
      confirmAbandon: false,
      done: null              // { label } — bandeau doux après un accomplissement (guide vers la pile)
    }
  };
  function resetForm() { ui.form = { title: '', domain: domains.list[0].id, freq: '' }; }
  function resetPerso() { ui.quest.perso = { title: '', domain: domains.list[0].id, minutes: 20 }; }

  // Chrono d'affichage : tant qu'une quête VALIDE tourne, on repeint chaque seconde pour
  // faire descendre le compte à rebours (aucune écriture — juste un paint dérivé de Date.now()).
  var questTick = null;
  function syncQuestTick() {
    var active = derive.isValidActiveQuest(store.get().activeQuest);
    if (active && !questTick) { questTick = setInterval(paint, 1000); }
    else if (!active && questTick) { clearInterval(questTick); questTick = null; }
  }
  // mm:ss d'une durée en ms (arrondi au plafond → le rebours n'affiche 0:00 qu'une fois écoulé).
  function fmtClock(ms) {
    var s = Math.max(0, Math.ceil(ms / 1000));
    var m = Math.floor(s / 60);
    return m + ':' + ('0' + (s % 60)).slice(-2);
  }

  var ceremonyTimer = null;
  // Respecte le réglage système : reduce-motion → cérémonie INSTANTANÉE (pas de suspense).
  function prefersReduced() {
    try { return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches); }
    catch (e) { return false; }
  }

  /* ------------------------------------------------------------------- handlers */
  function onCreateSubmit(e) {
    if (e && e.preventDefault) e.preventDefault();
    var created = actions.createHabit(ui.form.title, ui.form.domain, ui.form.freq);
    if (created) resetForm();
    paint();
  }
  function validate(id) { actions.validateHabit(id); } // store.set → subscribe → paint

  /* --- ouverture de coffre : la cérémonie (Phase 1.3) --- */
  // On MUTE d'abord (openChest fige le tirage en inventory) puis on JOUE la présentation :
  // ainsi la récompense est en sûreté même si l'utilisateur ferme au milieu. Suspense doux
  // (~1,5 s) → révélation ; skippable ; instantané en reduce-motion.
  function openChest(chestId) {
    var res = actions.openChest(chestId);
    if (!res || !res.ok) { paint(); return; }       // introuvable (déjà ouvert) → no-op propre
    if (ceremonyTimer) { clearTimeout(ceremonyTimer); ceremonyTimer = null; }
    var reduce = prefersReduced();
    ui.ceremony = {
      phase: reduce ? 'reveal' : 'suspense',
      chestType: res.chestType, item: res.item, sourceLabel: res.sourceLabel
    };
    paint();
    if (!reduce) {
      ceremonyTimer = setTimeout(function () {
        if (ui.ceremony && ui.ceremony.phase === 'suspense') { ui.ceremony.phase = 'reveal'; paint(); }
        ceremonyTimer = null;
      }, 1500);
    }
  }
  function skipCeremony() {
    if (ceremonyTimer) { clearTimeout(ceremonyTimer); ceremonyTimer = null; }
    if (ui.ceremony && ui.ceremony.phase === 'suspense') { ui.ceremony.phase = 'reveal'; paint(); }
  }
  function closeCeremony() {
    if (ceremonyTimer) { clearTimeout(ceremonyTimer); ceremonyTimer = null; }
    ui.ceremony = null; paint();
  }

  /* --- quêtes minutées (Phase 1.4) --- */
  function startCatalogueQuest(q) {
    actions.startQuest({ questId: q.id, title: q.title, domain: q.domain, minutes: q.minutes });
    ui.quest.done = null; ui.quest.confirmAbandon = false;
    paint();
  }
  function startPersoQuest() {
    var p = ui.quest.perso;
    var res = actions.startQuest({ questId: null, title: p.title, domain: p.domain, minutes: p.minutes });
    if (res && res.ok) { resetPerso(); ui.quest.done = null; ui.quest.confirmAbandon = false; }
    paint();
  }
  function finishActiveQuest() {
    var res = actions.finishQuest();
    if (res && res.ok) {
      var t = chestTypes.get(res.tier);
      ui.quest.done = { label: t ? t.label : 'un coffre' };
      ui.quest.confirmAbandon = false;
    }
    paint();
  }
  function askAbandon() { ui.quest.confirmAbandon = true; paint(); }
  function cancelAbandon() { ui.quest.confirmAbandon = false; paint(); }
  function confirmAbandon() { actions.abandonQuest(); ui.quest.confirmAbandon = false; paint(); }

  function startEdit(hb) {
    ui.editingId = hb.id;
    ui.edit = { title: hb.title, domain: hb.domain, freq: hb.freq || '' };
    ui.confirmDeleteId = null;
    paint();
  }
  function saveEdit(id) {
    if (actions.editHabit(id, { title: ui.edit.title, domain: ui.edit.domain, freq: ui.edit.freq })) {
      ui.editingId = null;
    }
    paint();
  }
  function cancelEdit() { ui.editingId = null; paint(); }

  function askDelete(id) { ui.confirmDeleteId = id; paint(); }
  function cancelDelete() { ui.confirmDeleteId = null; paint(); }
  function confirmDelete(id) { ui.confirmDeleteId = null; actions.deleteHabit(id); paint(); }

  /* --------------------------------------------------------------- composants */
  function DomainChips(selectedId, onPick) {
    return html`
      <div class="dom-select" role="group" aria-label="Domaine">
        ${domains.list.map(function (d) {
          var on = d.id === selectedId;
          return html`
            <button type="button" class="dom-chip" aria-pressed=${on ? 'true' : 'false'}
                    onClick=${function () { onPick(d.id); }}>
              <span class="d-emoji" aria-hidden="true">${d.emoji}</span>${d.label}
            </button>`;
        })}
      </div>`;
  }

  function Creator() {
    return html`
      <form class="creator" onSubmit=${onCreateSubmit}>
        <label class="lab" for="new-habit">Nouvelle habitude</label>
        <input id="new-habit" class="in" type="text" value=${ui.form.title}
               placeholder="Ex. Lire 10 pages" aria-label="Titre de la nouvelle habitude"
               autocomplete="off"
               onInput=${function (e) { ui.form.title = e.target.value; paint(); }} />
        <span class="lab2">Domaine</span>
        ${DomainChips(ui.form.domain, function (id) { ui.form.domain = id; paint(); })}
        <input class="in" type="text" value=${ui.form.freq}
               placeholder="À quel rythme ? Ex. chaque jour, 3×/semaine, quand je peux"
               aria-label="Fréquence, libre et facultative" autocomplete="off"
               onInput=${function (e) { ui.form.freq = e.target.value; paint(); }} />
        <button class="btn" type="submit" disabled=${!ui.form.title.trim()}>Ajouter l’habitude</button>
      </form>`;
  }

  function EditCard(hb) {
    return html`
      <div class="habit editing">
        <label class="lab">Titre</label>
        <input class="in" type="text" value=${ui.edit.title} aria-label="Titre" autocomplete="off"
               onInput=${function (e) { ui.edit.title = e.target.value; paint(); }} />
        <span class="lab2">Domaine</span>
        ${DomainChips(ui.edit.domain, function (id) { ui.edit.domain = id; paint(); })}
        <label class="lab" style="margin-top:14px">Fréquence</label>
        <input class="in" type="text" value=${ui.edit.freq} placeholder="Ex. chaque jour"
               aria-label="Fréquence, libre et facultative" autocomplete="off"
               onInput=${function (e) { ui.edit.freq = e.target.value; paint(); }} />
        <div class="edit-actions">
          <button class="btn" type="button" disabled=${!ui.edit.title.trim()}
                  onClick=${function () { saveEdit(hb.id); }}>Enregistrer</button>
          <button class="btn ghost" type="button" onClick=${cancelEdit}>Annuler</button>
        </div>
      </div>`;
  }

  function HabitCard(hb) {
    if (ui.editingId === hb.id) return EditCard(hb);
    var st = store.get();
    var count = derive.habitCount(st, hb.id);
    var done = derive.isHabitValidatedOn(st, hb.id, store.todayKey());
    var d = domains.get(hb.domain);
    var sub = (d ? d.label : hb.domain) + (hb.freq ? ' · ' + hb.freq : '');
    return html`
      <div class="habit">
        <div class="habit-head">
          <span class="h-emoji" aria-hidden="true">${d ? d.emoji : '•'}</span>
          <div class="h-main">
            <div class="h-title">${hb.title}</div>
            <div class="h-sub">${sub}</div>
          </div>
          ${count > 0
            ? html`<span class="h-count" aria-label=${'validée ' + count + ' fois'}>
                     ${count}<span class="u">fois</span></span>`
            : null}
        </div>
        <div class="habit-foot">
          ${done
            ? html`<span class="done" role="status">Fait ✓</span>`
            : html`<button class="btn val" type="button"
                     onClick=${function () { validate(hb.id); }}>Je l’ai fait</button>`}
          <div class="h-actions">
            <button class="lnk" type="button" onClick=${function () { startEdit(hb); }}
                    aria-label=${'Modifier ' + hb.title}>Modifier</button>
            <button class="lnk" type="button" onClick=${function () { askDelete(hb.id); }}
                    aria-label=${'Supprimer ' + hb.title}>Supprimer</button>
          </div>
        </div>
        ${ui.confirmDeleteId === hb.id
          ? html`
            <div class="del-confirm" role="group" aria-label="Confirmer la suppression">
              <span class="msg">Supprimer « ${hb.title} » ?</span>
              <button class="btn" type="button"
                      onClick=${function () { confirmDelete(hb.id); }}>Oui, supprimer</button>
              <button class="btn ghost" type="button" onClick=${cancelDelete}>Annuler</button>
            </div>`
          : null}
      </div>`;
  }

  function EmptyState() {
    return html`
      <div class="empty">
        <div class="e-emoji" aria-hidden="true">🌱</div>
        <div class="e-title">Ton île attend sa première graine</div>
        <p>Crée une habitude que tu veux faire souvent — elle réveillera ton île.</p>
      </div>`;
  }

  /* ------------------------------------------------------- coffres (Phase 1.2) */
  // Une entrée de la pile : vignette placeholder + type + libellé de source.
  // Non interactive : en 1.2 le coffre s'affiche seulement (l'ouverture = Phase 1.3).
  function ChestCard(c) {
    var t = chestTypes.get(c.type);
    var typeLabel = t ? t.label : 'Coffre';
    return html`
      <li class="chest">
        <span class="chest-vig chest-vig--${c.type}" aria-hidden="true"></span>
        <div class="chest-main">
          <div class="chest-title">${typeLabel}</div>
          <div class="chest-src">${c.sourceLabel}</div>
        </div>
        <button class="btn gold chest-open" type="button"
                aria-label=${'Ouvrir : ' + typeLabel}
                onClick=${function () { openChest(c.id); }}>Ouvrir</button>
      </li>`;
  }

  // Pile SEREINE : pas de badge rouge, pas de compteur culpabilisant, pas d'« ouvre
  // vite ». Absente tant qu'il n'y a aucun coffre (0 coffre = rien ne s'affiche → état
  // vide serein). Les plus récents en haut ; c'est déjà une vue liste accessible.
  function ChestPile() {
    var list = (store.get().chests || []).filter(function (c) { return c && c.id; });
    if (!list.length) return null;
    var display = list.slice().reverse();
    return html`
      <section class="section chest-section" aria-label="Coffres à découvrir">
        <h2 class="sec-title">À découvrir</h2>
        <p class="sec-note">Tes coffres s’accumulent tranquillement — chacun garde le
        souvenir de ce que tu as accompli. Rien ne presse.</p>
        <ul class="chest-list">${display.map(ChestCard)}</ul>
      </section>`;
  }

  /* ------------------------------------------------ carte-récompense (placeholder) */
  // Placeholder géométrique propre (les SVG Claude Design la remplaceront, jamais
  // redessinés). En 1.3 seule la rareté « commun » est produite → seule elle est stylée.
  function RewardCard(item) {
    var d = domains.get(item.domain);
    return html`
      <div class="reward-card">
        <span class="rc-emoji" aria-hidden="true">${d ? d.emoji : '✨'}</span>
        <div class="rc-name">${item.name}</div>
        <span class="rc-rarity rc-rarity--${item.rarity}">${cards.rarityLabel(item.rarity)}</span>
      </div>`;
  }

  // La cérémonie (< 6 s, skippable, instantanée en reduce-motion) : suspense doux →
  // révélation « Tu as obtenu … » → la carte rejoint la collection (bouton doré).
  function Ceremony() {
    var c = ui.ceremony;
    if (!c) return null;
    var suspense = c.phase === 'suspense';
    return html`
      <div class="ceremony" role="dialog" aria-modal="true" aria-label="Ouverture d’un coffre"
           onClick=${suspense ? skipCeremony : null}>
        ${suspense
          ? html`
            <div class="cer-stage">
              <span class="cer-chest chest-vig chest-vig--${c.chestType}" aria-hidden="true"></span>
              <p class="cer-hint">Ouverture…
                <button class="cer-skip" type="button"
                        onClick=${function (e) { if (e && e.stopPropagation) e.stopPropagation(); skipCeremony(); }}>Passer</button>
              </p>
            </div>`
          : html`
            <div class="cer-stage cer-reveal" role="status">
              <p class="cer-kicker">Tu as obtenu</p>
              ${RewardCard(c.item)}
              <p class="cer-src">${c.sourceLabel}</p>
              <button class="btn gold" type="button" onClick=${closeCeremony}>Rejoindre ma collection</button>
            </div>`}
      </div>`;
  }

  /* ------------------------------------------------ ta collection (Phase 1.3, amorce) */
  // L'écran Collection complet = Phase 3.1 ; ici, une liste sémantique accessible qui
  // prouve que la carte révélée porte bien ses métadonnées-souvenir (date + source).
  // Absente tant qu'aucune carte n'a été obtenue (état vide serein). Récentes en haut.
  function CollectionCard(e) {
    var it = cards.resolve(e.itemId);
    var d = domains.get(it.domain);
    var meta = (d ? d.label : (it.domain || '—')) + ' · ' + cards.rarityLabel(it.rarity) + ' · ' + e.day;
    return html`
      <li class="coll-card">
        <span class="cc-emoji" aria-hidden="true">${d ? d.emoji : '✨'}</span>
        <div class="cc-main">
          <div class="cc-name">${it.name}</div>
          <div class="cc-meta">${meta}</div>
          <div class="cc-src">${e.sourceLabel}</div>
        </div>
      </li>`;
  }
  function CollectionSection() {
    var inv = (store.get().inventory || []).filter(function (e) { return e && e.id; });
    if (!inv.length) return null;
    var display = inv.slice().reverse();
    return html`
      <section class="section collection-section" aria-label="Ta collection">
        <h2 class="sec-title">Ta collection</h2>
        <p class="sec-note">Chaque carte garde la date et l’action réelle qui l’a méritée.</p>
        <ul class="card-list">${display.map(CollectionCard)}</ul>
      </section>`;
  }

  /* ------------------------------------------------ quêtes minutées (Phase 1.4) */
  // Carte de la quête EN COURS : anneau de progression + compte à rebours (arbitrage Leo).
  // L'anneau se remplit vers la durée CIBLE et passe au DORÉ à 50 % (gate débloqué). Le
  // bouton « J'ai fini » reste grisé avant 50 % avec « encore ~X min » (non punitif) ; abandon
  // possible à tout moment, sans rien retirer. Le chrono est RÉEL (repris après reload).
  function ActiveQuestCard(aq) {
    var prog = derive.questProgress(aq, Date.now());
    var deg = Math.round(prog.progress * 360);
    var ringCol = prog.gateReached ? 'var(--gold)' : 'var(--accent)';
    var ringStyle = 'background: conic-gradient(' + ringCol + ' ' + deg + 'deg, var(--line) ' + deg + 'deg);';
    var d = domains.get(aq.domain);
    var gateMin = Math.max(1, Math.ceil(prog.remainingToGateMs / 60000));
    var aria = 'Quête en cours : ' + aq.title + '. Temps restant ' + fmtClock(prog.remainingToTargetMs) +
      '. ' + (prog.gateReached ? 'Tu peux valider.' : 'Encore environ ' + gateMin + ' minutes avant de pouvoir valider.');
    return html`
      <div class="active-quest" role="group" aria-label=${aria}>
        <div class="aq-head">
          <div class="qring ${prog.gateReached ? 'ready' : ''}" style=${ringStyle} aria-hidden="true">
            <div class="qring-in">
              <span class="qring-time">${fmtClock(prog.remainingToTargetMs)}</span>
              <span class="qring-unit">restant</span>
            </div>
          </div>
          <div class="aq-main">
            <div class="aq-title"><span class="h-emoji" aria-hidden="true">${d ? d.emoji : '•'}</span>${aq.title}</div>
            <div class="aq-sub">${(d ? d.label : aq.domain)} · ${aq.minutes} min estimées</div>
            <p class="aq-note">Le chrono tourne pour de vrai — même si tu fermes l’app, il reprend où il en était.</p>
          </div>
        </div>
        <div class="aq-foot">
          ${prog.gateReached
            ? html`<button class="btn gold aq-finish" type="button" onClick=${finishActiveQuest}>J’ai fini</button>`
            : html`
              <div class="aq-gate">
                <button class="btn aq-finish" type="button" disabled>J’ai fini</button>
                <span class="aq-gatehint">Encore ~${gateMin} min avant de pouvoir valider — rien ne presse.</span>
              </div>`}
          ${ui.quest.confirmAbandon
            ? null
            : html`<button class="lnk aq-abandon" type="button" onClick=${askAbandon}>Arrêter</button>`}
        </div>
        ${ui.quest.confirmAbandon
          ? html`
            <div class="del-confirm" role="group" aria-label="Confirmer l’arrêt de la quête">
              <span class="msg">Arrêter cette quête ? Rien n’est perdu, tu pourras la relancer.</span>
              <button class="btn ghost" type="button" onClick=${confirmAbandon}>Oui, arrêter</button>
              <button class="btn" type="button" onClick=${cancelAbandon}>Continuer</button>
            </div>`
          : null}
      </div>`;
  }

  // Une ligne du catalogue curé : titre + durée + « pourquoi » + démarrer.
  function QuestRow(q) {
    return html`
      <li class="quest-row">
        <div class="qr-main">
          <div class="qr-title">${q.title}<span class="qr-min">${q.minutes} min</span></div>
          <div class="qr-why">${q.why}</div>
        </div>
        <button class="btn qr-start" type="button" aria-label=${'Démarrer : ' + q.title + ', ' + q.minutes + ' minutes'}
                onClick=${function () { startCatalogueQuest(q); }}>Démarrer</button>
      </li>`;
  }

  // Le lanceur de quêtes (visible quand AUCUNE quête ne tourne) : catalogue filtré par domaine
  // + création d'une quête perso (récompense JAMAIS saisie — dérivée de la durée à la fin).
  function QuestLauncher() {
    var list = quests.byDomain(ui.quest.domain);
    var p = ui.quest.perso;
    return html`
      <div class="quest-launcher">
        <span class="lab2" style="margin-top:0">Choisis un domaine</span>
        ${DomainChips(ui.quest.domain, function (id) { ui.quest.domain = id; paint(); })}
        <ul class="quest-list">${list.map(QuestRow)}</ul>

        <div class="perso-quest">
          <div class="pq-head">Ou lance la tienne</div>
          <input class="in" type="text" value=${p.title} placeholder="Ex. Ranger le bureau"
                 aria-label="Titre de ta quête" autocomplete="off"
                 onInput=${function (e) { ui.quest.perso.title = e.target.value; paint(); }} />
          <span class="lab2">Domaine</span>
          ${DomainChips(p.domain, function (id) { ui.quest.perso.domain = id; paint(); })}
          <span class="lab2">Durée</span>
          <div class="dur-select" role="group" aria-label="Durée en minutes">
            ${DURATION_PRESETS.map(function (m) {
              var on = m === p.minutes;
              return html`
                <button type="button" class="dur-chip" aria-pressed=${on ? 'true' : 'false'}
                        onClick=${function () { ui.quest.perso.minutes = m; paint(); }}>${m} min</button>`;
            })}
          </div>
          <p class="pq-note">Ta récompense dépendra de la durée — elle se révélera à la fin, jamais avant.</p>
          <button class="btn" type="button" disabled=${!p.title.trim()}
                  onClick=${startPersoQuest}>Démarrer cette quête</button>
        </div>
      </div>`;
  }

  // Section Quêtes : soit la quête en cours (un seul chrono), soit le lanceur. Un bandeau doux
  // guide vers la pile « À découvrir » juste après un accomplissement.
  function QuestSection() {
    var aq = store.get().activeQuest;
    var active = derive.isValidActiveQuest(aq);
    return html`
      <section class="section quest-section" aria-label="Quêtes minutées">
        <h2 class="sec-title">Quêtes minutées</h2>
        <p class="sec-note">Une action, un chrono honnête. À la moitié du temps, tu peux valider —
        et tu reçois un coffre à la hauteur de l’effort.</p>
        ${ui.quest.done
          ? html`
            <div class="quest-done" role="status">
              <span>Quête accomplie 🎉 — ton <strong>${ui.quest.done.label}</strong> t’attend plus bas, dans « À découvrir ».</span>
              <button class="lnk" type="button" onClick=${function () { ui.quest.done = null; paint(); }}>OK</button>
            </div>`
          : null}
        ${active ? ActiveQuestCard(aq) : QuestLauncher()}
      </section>`;
  }

  function App() {
    var habits = (store.get().habits || []).filter(function (hb) { return hb && hb.id; });
    return html`
      <div class="sky" aria-hidden="true"></div>
      <main class="wrap">
        <header class="app-hero">
          <div class="eyebrow">ASCEND · v${VER}</div>
          <h1>Tes habitudes</h1>
          <p class="lede">Chaque fois que tu la fais pour de vrai, valide-la ici.
          Rien ne se perd, rien ne se punit — ton île avance avec toi.</p>
        </header>

        ${Creator()}

        <section class="section" aria-label="Tes habitudes">
          ${habits.length
            ? html`<div class="habits">${habits.map(HabitCard)}</div>`
            : EmptyState()}
        </section>

        ${QuestSection()}
        ${ChestPile()}
        ${CollectionSection()}
      </main>
      ${Ceremony()}`;
  }

  /* ------------------------------------------------------------------- montage */
  var mount = document.getElementById('app');
  function paint() { render(h(App), mount); syncQuestTick(); }
  store.subscribe(function () { paint(); });
  paint();
  var splash = document.getElementById('splash');
  if (splash) splash.classList.add('hidden');
})();

</script>
</body>
</html>
